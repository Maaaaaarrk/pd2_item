<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PD2 Theoretical Item Builder</title>
<style>
  @font-face {
    font-family: 'Exocet';
    src: url('data/font/exocetblizzardot-medium.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 20px; }
  h1 { text-align: center; color: #c4a84f; margin-bottom: 20px; font-size: 1.6rem; font-family: 'Exocet', serif; }
  .top-links { text-align: center; margin-bottom: 16px; display: flex; justify-content: center; gap: 12px; }
  .top-links a { color: #a0a0b0; font-size: 0.85rem; text-decoration: none; padding: 5px 12px; border: 1px solid #0f3460; border-radius: 4px; transition: all 0.15s; }
  .top-links a:hover { color: #c4a84f; border-color: #c4a84f; }
  .top-links .report-btn { border-color: #553333; color: #cc8888; }
  .top-links .report-btn:hover { border-color: #cc4444; color: #ff6666; }
  .container { max-width: 1100px; margin: 0 auto; display: flex; gap: 20px; flex-wrap: wrap; }
  .panel { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; flex: 1; min-width: 320px; }
  .panel h2 { color: #c4a84f; font-size: 1.1rem; margin-bottom: 12px; border-bottom: 1px solid #0f3460; padding-bottom: 8px; font-family: 'Exocet', serif; }
  label { display: block; font-size: 0.85rem; color: #a0a0b0; margin-bottom: 4px; margin-top: 10px; }
  select, input[type="text"], input[type="number"] { width: 100%; padding: 8px; background: #0f3460; border: 1px solid #1a4080; color: #e0e0e0; border-radius: 4px; font-size: 0.9rem; }
  select:focus, input:focus { outline: none; border-color: #c4a84f; }
  input[type="checkbox"] { appearance: none; width: 16px; height: 16px; background: #0f3460; border: 1px solid #1a4080; border-radius: 3px; cursor: pointer; vertical-align: middle; flex-shrink: 0; }
  input[type="checkbox"]:checked { background: #c4a84f; border-color: #c4a84f; }
  input[type="checkbox"]:checked::after { content: '\2713'; display: block; text-align: center; color: #1a1a2e; font-size: 12px; line-height: 16px; font-weight: bold; }
  .quality-btns { display: flex; gap: 8px; margin-top: 10px; }
  .quality-btns button { flex: 1; padding: 10px; border: 2px solid #0f3460; background: #0f3460; color: #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 0.95rem; font-weight: bold; transition: all 0.15s; }
  .quality-btns button:hover { border-color: #c4a84f; }
  .quality-btns button.active-magic { border-color: #4169e1; background: #1a3a7a; color: #6495ed; }
  .quality-btns button.active-rare { border-color: #cccc00; background: #3a3a0a; color: #ffff44; }
  .affix-section { margin-top: 14px; }
  .affix-section h3 { font-size: 0.95rem; color: #8899aa; margin-bottom: 6px; }
  .affix-slot { margin-bottom: 8px; position: relative; }
  .affix-slot select { font-size: 0.85rem; }
  .affix-list-filter { margin-bottom: 6px; }
  .item-preview { background: #000; border: 1px solid #333; border-radius: 6px; padding: 20px; text-align: center; min-height: 200px; font-family: 'Exocet', serif; }
  .item-preview .item-name { font-size: 1.3rem; font-weight: bold; margin-bottom: 12px; font-family: 'Exocet', serif; letter-spacing: 1px; }
  .item-preview .item-name.magic { color: #6495ed; }
  .item-preview .item-name.rare { color: #ffff44; }
  .item-preview .base-stats { color: #8888aa; font-size: 0.9rem; margin-bottom: 10px; }
  .item-preview .base-stats div { margin: 2px 0; }
  .item-preview .affix-stats { color: #4169e1; font-size: 0.9rem; text-align: left; display: inline-block; }
  .item-preview .affix-stats div { margin: 2px 0; }
  .item-preview .affix-stats .prefix-stat { color: #6495ed; }
  .item-preview .affix-stats .suffix-stat { color: #6495ed; }
  .item-preview .req { color: #666; font-size: 0.85rem; margin-top: 8px; }
  .item-preview .separator { border-top: 1px solid #333; margin: 8px 0; }
  .no-item { color: #555; font-style: italic; margin-top: 60px; }
  .mod-line { margin: 1px 0; }
  .mod-range { color: #888; font-size: 0.8rem; }
  .item-preview .base-name { color: #ffff44; font-size: 0.95rem; margin-bottom: 10px; }
  .eth-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; color: #a0a0b0; }
  .eth-toggle input { cursor: pointer; }
  .item-preview .ethereal-tag { color: #888; font-size: 0.85rem; font-style: italic; margin-bottom: 4px; }
  .reroll-btn { cursor: pointer; font-size: 1rem; color: #888; margin-left: 6px; vertical-align: middle; }
  .reroll-btn:hover { color: #ffff44; }
  .odds-section { margin-top: 12px; text-align: left; display: inline-block; width: 100%; }
  .odds-section h4 { color: #c4a84f; font-size: 0.85rem; margin-bottom: 8px; font-family: 'Exocet', serif; }
  .odds-row { display: flex; align-items: center; justify-content: space-between; margin: 4px 0; font-size: 0.8rem; }
  .odds-label { color: #a0a0b0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .odds-pct { color: #e0e0e0; min-width: 70px; text-align: right; font-size: 0.75rem; white-space: nowrap; margin-left: 8px; }
  .odds-combined { margin-top: 10px; padding-top: 8px; border-top: 1px solid #333; text-align: center; }
  .odds-combined .label { color: #a0a0b0; font-size: 0.8rem; }
  .odds-combined .value { color: #c4a84f; font-size: 1.1rem; font-family: 'Exocet', serif; }
</style>
<script src="data/js/Armor.js"></script>
<script src="data/js/Weapons.js"></script>
<script src="data/js/ItemTypes.js"></script>
<script src="data/js/MagicPrefix.js"></script>
<script src="data/js/MagicSuffix.js"></script>
<script src="data/js/WeaponClass.js"></script>
<script src="data/js/RarePrefix.js"></script>
<script src="data/js/RareSuffix.js"></script>
<script src="data/js/Properties.js"></script>
</head>
<body>
<h1>PD2 Theoretical Item Builder</h1>
<div class="top-links">
  <a href="https://maaaaaarrk.github.io/Hiim-PD2-Resources/" target="_blank">Hiim PD2 Resources</a>
  <a href="https://github.com/Maaaaaarrk/pd2_item/issues" target="_blank" class="report-btn">Report an Issue</a>
</div>
<div class="container">
  <!-- Left Panel: Selection -->
  <div class="panel" style="flex: 1.2;">
    <h2>Item Selection</h2>

    <label for="category">Category</label>
    <select id="category">
      <option value="">-- Select --</option>
      <option value="armor">Armor</option>
      <option value="weapon">Weapon</option>
      <option value="ring">Ring</option>
      <option value="amulet">Amulet</option>
      <option value="jewel">Jewel</option>
      <option value="charm">Charm</option>
    </select>

    <label for="tier">Tier</label>
    <select id="tier" disabled>
      <option value="">-- Select category first --</option>
    </select>

    <label for="item-class">Item Class</label>
    <select id="item-class" disabled>
      <option value="">-- Select tier first --</option>
    </select>

    <label for="base">Item Base</label>
    <select id="base" disabled>
      <option value="">-- Select class first --</option>
    </select>

    <label>Quality</label>
    <div class="quality-btns">
      <button id="btn-magic" disabled onclick="setQuality('magic')">Magic</button>
      <button id="btn-rare" disabled onclick="setQuality('rare')">Rare</button>
    </div>

    <div id="ethereal-area" style="display:none; margin-top: 10px;">
      <label class="eth-toggle"><input type="checkbox" id="eth-check" onchange="toggleEthereal()"> Ethereal (+25% base stats, 1 in 20)</label>
    </div>

    <div id="ilvl-area" style="display:none; margin-top: 10px;">
      <label for="ilvl-input">Item Level (ilvl) <span id="alvl-display" style="color:#888; font-size:0.8rem;"></span></label>
      <div style="display:flex; gap:6px; align-items:center;">
        <input type="number" id="ilvl-input" min="1" max="99" value="99" style="flex:1;" onchange="onIlvlChange()" oninput="onIlvlChange()">
        <button id="btn-optimal" onclick="findOptimalIlvl()" style="padding:6px 10px; background:#0f3460; border:1px solid #1a4080; color:#c4a84f; border-radius:4px; cursor:pointer; font-size:0.8rem; white-space:nowrap;">Best ilvl</button>
      </div>
    </div>

    <div id="affix-area" style="display:none;">
      <div class="affix-section">
        <h3 id="prefix-header">Prefixes</h3>
        <div id="prefix-slots"></div>
      </div>
      <div class="affix-section">
        <h3 id="suffix-header">Suffixes</h3>
        <div id="suffix-slots"></div>
      </div>
    </div>
  </div>

  <!-- Right Panel: Preview -->
  <div class="panel" style="flex: 1;">
    <h2>Item Preview</h2>
    <div class="item-preview" id="preview">
      <div class="no-item">Select an item base and quality to begin</div>
    </div>
  </div>
</div>

<script>
// --- Data from global JS files ---
let armorData = ARMOR_DATA;
let weaponData = WEAPONS_DATA;
let itemTypes = ITEM_TYPES_DATA;
let prefixes = MAGIC_PREFIX_DATA.filter(a => a.Name && a.spawnable !== '0');
let suffixes = MAGIC_SUFFIX_DATA.filter(a => a.Name && a.spawnable !== '0');
let typeMap = {};
for (const t of itemTypes) { if (t.Code) typeMap[t.Code] = t; }
let rarePrefixes = RARE_PREFIX_DATA.filter(a => a.name);
let rareSuffixes = RARE_SUFFIX_DATA.filter(a => a.name);

// Misc items that aren't in Armor/Weapons data
const miscItems = [
  { name: 'Ring', code: 'rin', type: 'ring', level: '1', levelreq: '0', category: 'ring' },
  { name: 'Amulet', code: 'amu', type: 'amul', level: '1', levelreq: '0', category: 'amulet' },
  { name: 'Jewel', code: 'jew', type: 'jewl', level: '1', levelreq: '0', category: 'jewel' },
  { name: 'Small Charm', code: 'cm1', type: 'scha', level: '1', levelreq: '0', category: 'charm' },
  { name: 'Large Charm', code: 'cm2', type: 'mcha', level: '1', levelreq: '0', category: 'charm' },
  { name: 'Grand Charm', code: 'cm3', type: 'lcha', level: '1', levelreq: '0', category: 'charm' },
];

let state = { category: '', tier: '', itemClass: '', baseIndex: -1, quality: '', ethereal: false, ilvl: 99, selectedPrefixes: [], selectedSuffixes: [], rareName: '' };

// --- Tier detection: Normal / Exceptional / Elite ---
function getItemTier(item) {
  const code = item.code;
  if (code && item.ultracode && code === item.ultracode && code !== item.normcode) return 'elite';
  if (code && item.ubercode && code === item.ubercode && code !== item.normcode) return 'exceptional';
  return 'normal';
}

// --- Get display name for a type code from ItemTypes ---
function getTypeDisplayName(typeCode) {
  const entry = typeMap[typeCode];
  return entry ? entry.ItemType : typeCode;
}

// --- Rare name generation ---
function getValidRareNames(nameList, item) {
  const { fullChain, direct } = getItemTypeSets(item);
  return nameList.filter(a => affixMatchesItem(a, fullChain, direct));
}

function rollRareName(item) {
  const validPre = getValidRareNames(rarePrefixes, item);
  const validSuf = getValidRareNames(rareSuffixes, item);
  if (validPre.length === 0 || validSuf.length === 0) return 'Rare ' + item.name;
  const pre = validPre[Math.floor(Math.random() * validPre.length)];
  const suf = validSuf[Math.floor(Math.random() * validSuf.length)];
  return pre.name + ' ' + suf.name;
}

// --- Type hierarchy: get all type codes for an item (its type + all ancestors) ---
function getTypeChain(typeCode) {
  const chain = new Set();
  const visited = new Set();
  const queue = [typeCode];
  while (queue.length) {
    const code = queue.shift();
    if (!code || visited.has(code)) continue;
    visited.add(code);
    chain.add(code);
    const entry = typeMap[code];
    if (entry) {
      if (entry.Equiv1) queue.push(entry.Equiv1);
      if (entry.Equiv2) queue.push(entry.Equiv2);
    }
  }
  return chain;
}

// --- Check if an affix can appear on an item ---
// itype check uses full ancestor chain, etype check uses direct types only
function affixMatchesItem(affix, fullTypeChain, directTypes) {
  // Collect affix's included types
  const itypes = [];
  for (let i = 1; i <= 7; i++) {
    const v = affix['itype' + i];
    if (v) itypes.push(v);
  }
  if (itypes.length === 0) return false;

  // Collect affix's excluded types
  const etypes = [];
  for (let i = 1; i <= 5; i++) {
    const v = affix['etype' + i];
    if (v) etypes.push(v);
  }

  // Item must match at least one itype (full ancestor chain)
  const matches = itypes.some(it => fullTypeChain.has(it));
  if (!matches) return false;

  // Item must NOT match any etype (direct types only)
  const excluded = etypes.some(et => directTypes.has(et));
  return !excluded;
}

// --- Build both type sets for an item ---
function getItemTypeSets(item) {
  const types1 = getTypeChain(item.type);
  const types2 = item.type2 ? getTypeChain(item.type2) : new Set();
  const fullChain = new Set([...types1, ...types2]);
  const direct = new Set();
  if (item.type) direct.add(item.type);
  if (item.type2) direct.add(item.type2);
  return { fullChain, direct };
}

// --- alvl calculation (from d2mods.info article 234) ---
function calcAlvl(ilvl, item) {
  let il = Math.min(ilvl, 99);
  const qlvl = parseInt(item.level) || 0;
  const magicLvl = parseInt(item['magic lvl']) || 0;
  if (qlvl > il) il = qlvl;
  let alvl;
  if (magicLvl > 0) {
    alvl = il + magicLvl;
  } else {
    if (il < (99 - Math.floor(qlvl / 2))) {
      alvl = il - Math.floor(qlvl / 2);
    } else {
      alvl = 2 * il - 99;
    }
  }
  return Math.min(alvl, 99);
}

// --- Check if affix is eligible at a given alvl ---
function affixEligibleAtAlvl(affix, alvl) {
  const affixLvl = parseInt(affix.level) || 0;
  const affixMaxLvl = affix.maxlevel ? parseInt(affix.maxlevel) : 99;
  return affixLvl <= alvl && alvl <= affixMaxLvl;
}

// --- Get valid affixes for an item base + quality (type match only, no ilvl filter) ---
function getValidAffixes(affixList, item, quality) {
  const { fullChain, direct } = getItemTypeSets(item);

  return affixList.filter(a => {
    if (a.frequency === '0') return false;
    if (quality === 'rare' && a.rare !== '1') return false;
    return affixMatchesItem(a, fullChain, direct);
  });
}

// --- Filter a valid affix list by alvl eligibility ---
function filterByAlvl(affixList, alvl) {
  return affixList.filter(a => affixEligibleAtAlvl(a, alvl));
}

// --- Helper to reset downstream controls ---
function resetFrom(level) {
  // level: 'tier', 'class', 'base', 'quality'
  const tierSel = document.getElementById('tier');
  const classSel = document.getElementById('item-class');
  const baseSel = document.getElementById('base');
  const btnMagic = document.getElementById('btn-magic');
  const btnRare = document.getElementById('btn-rare');

  if (level === 'tier' || level === 'all') {
    state.tier = '';
    tierSel.innerHTML = '<option value="">-- Select tier --</option>';
    tierSel.disabled = true;
  }
  if (level === 'tier' || level === 'class' || level === 'all') {
    state.itemClass = '';
    classSel.innerHTML = '<option value="">-- Select class --</option>';
    classSel.disabled = true;
  }
  if (level === 'tier' || level === 'class' || level === 'base' || level === 'all') {
    state.baseIndex = -1;
    baseSel.innerHTML = '<option value="">-- Select item --</option>';
    baseSel.disabled = true;
  }
  state.quality = '';
  state.ethereal = false;
  state.ilvl = 99;
  document.getElementById('eth-check').checked = false;
  document.getElementById('ethereal-area').style.display = 'none';
  document.getElementById('ilvl-area').style.display = 'none';
  document.getElementById('ilvl-input').value = 99;
  state.selectedPrefixes = [];
  state.selectedSuffixes = [];
  btnMagic.disabled = true;
  btnRare.disabled = true;
  btnMagic.className = '';
  btnRare.className = '';
  document.getElementById('affix-area').style.display = 'none';
  renderPreview();
}

// --- Get all items for the current category ---
// Categories that skip tier/class selection and go straight to item pick
const simpleCats = ['ring', 'amulet', 'jewel', 'charm'];

function isSimpleCategory(cat) {
  return simpleCats.includes(cat);
}

function getCategoryItems() {
  if (state.category === 'armor') return armorData;
  if (state.category === 'weapon') return weaponData;
  return miscItems.filter(i => i.category === state.category);
}

// --- UI handlers ---
document.getElementById('category').addEventListener('change', function() {
  state.category = this.value;
  resetFrom('tier');
  if (!state.category) return;

  if (isSimpleCategory(state.category)) {
    // Skip tier/class, go straight to base selection
    const baseSel = document.getElementById('base');
    baseSel.disabled = false;
    baseSel.innerHTML = '<option value="">-- Select item --</option>';

    const items = getCategoryItems();
    items.forEach((item, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = item.name;
      baseSel.appendChild(opt);
    });
    // Auto-select if only one item
    if (items.length === 1) {
      baseSel.value = 0;
      baseSel.dispatchEvent(new Event('change'));
    }
    return;
  }

  const tierSel = document.getElementById('tier');
  tierSel.disabled = false;
  tierSel.innerHTML = '<option value="">-- Select tier --</option>';

  const items = getCategoryItems().filter(i => i.name && i.name.trim());
  // Determine which tiers exist
  const tiers = new Set(items.map(i => getItemTier(i)));
  const tierLabels = { normal: 'Normal', exceptional: 'Exceptional', elite: 'Elite' };
  for (const t of ['normal', 'exceptional', 'elite']) {
    if (tiers.has(t)) {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = tierLabels[t];
      tierSel.appendChild(opt);
    }
  }
});

document.getElementById('tier').addEventListener('change', function() {
  state.tier = this.value;
  resetFrom('class');
  if (!state.tier) return;

  const classSel = document.getElementById('item-class');
  classSel.disabled = false;
  classSel.innerHTML = '<option value="">-- Select class --</option>';

  const items = getCategoryItems().filter(i => i.name && i.name.trim() && getItemTier(i) === state.tier);
  // Get unique type codes in order of first appearance
  const seen = new Set();
  const typeOrder = [];
  for (const item of items) {
    if (!seen.has(item.type)) {
      seen.add(item.type);
      typeOrder.push(item.type);
    }
  }
  for (const tc of typeOrder) {
    const opt = document.createElement('option');
    opt.value = tc;
    opt.textContent = getTypeDisplayName(tc);
    classSel.appendChild(opt);
  }
});

document.getElementById('item-class').addEventListener('change', function() {
  state.itemClass = this.value;
  resetFrom('base');
  if (!state.itemClass) return;

  const baseSel = document.getElementById('base');
  baseSel.disabled = false;
  baseSel.innerHTML = '<option value="">-- Select item --</option>';

  const allItems = getCategoryItems();
  const items = allItems.filter(i =>
    i.name && i.name.trim() &&
    getItemTier(i) === state.tier &&
    i.type === state.itemClass
  );

  for (const item of items) {
    const origIndex = allItems.indexOf(item);
    const opt = document.createElement('option');
    opt.value = origIndex;
    if (state.category === 'armor') {
      opt.textContent = item.name + ' (Def: ' + item.minac + '-' + item.maxac + ')';
    } else {
      let dmgText = item.mindam + '-' + item.maxdam;
      if (item['2handed'] === '1' || item['1or2handed'] === '1') {
        dmgText += ' / 2H: ' + item['2handmindam'] + '-' + item['2handmaxdam'];
      }
      opt.textContent = item.name + ' (' + dmgText + ')';
    }
    baseSel.appendChild(opt);
  }
});

document.getElementById('base').addEventListener('change', function() {
  state.baseIndex = parseInt(this.value);
  state.quality = '';
  state.ethereal = false;
  document.getElementById('eth-check').checked = false;
  state.selectedPrefixes = [];
  state.selectedSuffixes = [];
  const valid = !isNaN(state.baseIndex) && state.baseIndex >= 0;
  const charmOnly = state.category === 'charm';
  const canEth = valid && (state.category === 'armor' || state.category === 'weapon');
  document.getElementById('btn-magic').disabled = !valid;
  document.getElementById('btn-rare').disabled = !valid || charmOnly;
  document.getElementById('btn-magic').className = '';
  document.getElementById('btn-rare').className = '';
  document.getElementById('ethereal-area').style.display = canEth ? 'block' : 'none';
  document.getElementById('affix-area').style.display = 'none';
  renderPreview();
});

function toggleEthereal() {
  state.ethereal = document.getElementById('eth-check').checked;
  renderPreview();
}

function setQuality(q) {
  state.quality = q;
  state.selectedPrefixes = [];
  state.selectedSuffixes = [];
  document.getElementById('btn-magic').className = q === 'magic' ? 'active-magic' : '';
  document.getElementById('btn-rare').className = q === 'rare' ? 'active-rare' : '';
  // Show ilvl input
  document.getElementById('ilvl-area').style.display = 'block';
  updateAlvlDisplay();
  // Roll a random rare name when switching to rare
  if (q === 'rare') {
    const items = getCategoryItems();
    const item = items[state.baseIndex];
    state.rareName = rollRareName(item);
  } else {
    state.rareName = '';
  }
  buildAffixSlots();
  renderPreview();
}

function onIlvlChange() {
  const val = parseInt(document.getElementById('ilvl-input').value) || 1;
  state.ilvl = Math.max(1, Math.min(99, val));
  updateAlvlDisplay();
  renderPreview();
}

function updateAlvlDisplay() {
  if (state.baseIndex < 0) return;
  const items = getCategoryItems();
  const item = items[state.baseIndex];
  const alvl = calcAlvl(state.ilvl, item);
  document.getElementById('alvl-display').textContent = '(alvl: ' + alvl + ')';
}

function findOptimalIlvl() {
  if (state.baseIndex < 0 || !state.quality) return;
  const items = getCategoryItems();
  const item = items[state.baseIndex];

  const validPre = state._validPrefixes || [];
  const validSuf = state._validSuffixes || [];

  // Gather selected affixes
  const selPre = state.selectedPrefixes.filter(i => i >= 0).map(i => validPre[i]).filter(Boolean);
  const selSuf = state.selectedSuffixes.filter(i => i >= 0).map(i => validSuf[i]).filter(Boolean);
  if (selPre.length === 0 && selSuf.length === 0) return;

  let bestIlvl = 1;
  let bestProb = 0;

  const isJewelRare = state.quality === 'rare' && state.category === 'jewel';
  const preSlots = state.quality === 'rare' ? 3 : 1;
  const sufSlots = state.quality === 'rare' ? 3 : 1;

  for (let testIlvl = 1; testIlvl <= 99; testIlvl++) {
    const alvl = calcAlvl(testIlvl, item);

    // Check all selected affixes are eligible at this alvl
    const allEligible = [...selPre, ...selSuf].every(a => affixEligibleAtAlvl(a, alvl));
    if (!allEligible) continue;

    // Calculate pool sizes at this alvl
    const eligPre = filterByAlvl(validPre, alvl);
    const eligSuf = filterByAlvl(validSuf, alvl);

    const preTotalFreq = eligPre.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
    const sufTotalFreq = eligSuf.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);

    let prob = 1;
    if (isJewelRare) {
      let prodPre = 1, prodSuf = 1;
      for (const a of selPre) {
        const f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
        prodPre *= preTotalFreq > 0 ? f / preTotalFreq : 0;
      }
      for (const a of selSuf) {
        const f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
        prodSuf *= sufTotalFreq > 0 ? f / sufTotalFreq : 0;
      }
      const Np = selPre.length, Ns = selSuf.length;
      const wildCount = Math.max(0, (Np - 1) + (Ns - 1));
      let wildArr = 1;
      for (let i = 0; i < wildCount; i++) wildArr *= (2 - i);
      prob = prodPre * prodSuf * Math.max(Np, 1) * Math.max(Ns, 1) * wildArr;
    } else {
      if (selPre.length > 0) {
        let p = 1;
        for (let i = 0; i < selPre.length; i++) p *= (preSlots - i);
        for (const a of selPre) {
          const f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
          p *= preTotalFreq > 0 ? f / preTotalFreq : 0;
        }
        prob *= p;
      }
      if (selSuf.length > 0) {
        let p = 1;
        for (let i = 0; i < selSuf.length; i++) p *= (sufSlots - i);
        for (const a of selSuf) {
          const f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
          p *= sufTotalFreq > 0 ? f / sufTotalFreq : 0;
        }
        prob *= p;
      }
    }

    if (prob > bestProb) {
      bestProb = prob;
      bestIlvl = testIlvl;
    }
  }

  state.ilvl = bestIlvl;
  document.getElementById('ilvl-input').value = bestIlvl;
  updateAlvlDisplay();
  renderPreview();
}

function rerollRareName() {
  const items = getCategoryItems();
  const item = items[state.baseIndex];
  state.rareName = rollRareName(item);
  renderPreview();
}

function buildAffixSlots() {
  const isJewelRare = state.quality === 'rare' && state.category === 'jewel';
  const maxPre = state.quality === 'rare' ? 3 : 1;
  const maxSuf = state.quality === 'rare' ? 3 : 1;
  const area = document.getElementById('affix-area');
  area.style.display = 'block';

  if (isJewelRare) {
    document.getElementById('prefix-header').textContent = 'Prefixes (4 affixes total)';
    document.getElementById('suffix-header').textContent = 'Suffixes (4 affixes total)';
  } else {
    document.getElementById('prefix-header').textContent = 'Prefixes (up to ' + maxPre + ')';
    document.getElementById('suffix-header').textContent = 'Suffixes (up to ' + maxSuf + ')';
  }

  const items = getCategoryItems();
  const item = items[state.baseIndex];

  const validPrefixes = getValidAffixes(prefixes, item, state.quality);
  const validSuffixes = getValidAffixes(suffixes, item, state.quality);
  state._validPrefixes = validPrefixes;
  state._validSuffixes = validSuffixes;

  // Build prefix slots
  const preContainer = document.getElementById('prefix-slots');
  preContainer.innerHTML = '';
  for (let i = 0; i < maxPre; i++) {
    state.selectedPrefixes[i] = -1;
    preContainer.appendChild(createAffixSelect('prefix', i, validPrefixes));
  }

  // Build suffix slots
  const sufContainer = document.getElementById('suffix-slots');
  sufContainer.innerHTML = '';
  for (let i = 0; i < maxSuf; i++) {
    state.selectedSuffixes[i] = -1;
    sufContainer.appendChild(createAffixSelect('suffix', i, validSuffixes));
  }
}

// --- Get groups used by other slots of the same type, excluding the given slot ---
function getUsedGroups(type, excludeSlot) {
  const arr = type === 'prefix' ? state.selectedPrefixes : state.selectedSuffixes;
  const pool = type === 'prefix' ? state._validPrefixes : state._validSuffixes;
  const groups = new Set();
  for (let i = 0; i < arr.length; i++) {
    if (i === excludeSlot || arr[i] < 0) continue;
    const affix = pool[arr[i]];
    if (affix && affix.group) groups.add(affix.group);
  }
  return groups;
}

// --- Refresh all sibling slot options (to update group filtering) ---
function refreshAffixSlots(type) {
  const maxSlots = type === 'prefix' ? state.selectedPrefixes.length : state.selectedSuffixes.length;
  for (let i = 0; i < maxSlots; i++) {
    const sel = document.getElementById(type + '-' + i);
    if (sel && sel._populate) sel._populate();
  }
}

// --- Rare jewel: 4 total affixes max (1P + 1S guaranteed, 2 wild) ---
function getJewelAffixCount() {
  const preCount = state.selectedPrefixes.filter(i => i >= 0).length;
  const sufCount = state.selectedSuffixes.filter(i => i >= 0).length;
  return preCount + sufCount;
}

function enforceJewelCap() {
  const isJewelRare = state.quality === 'rare' && state.category === 'jewel';
  const atCap = isJewelRare && getJewelAffixCount() >= 4;

  // Disable/enable empty slots across both prefix and suffix
  for (const type of ['prefix', 'suffix']) {
    const arr = type === 'prefix' ? state.selectedPrefixes : state.selectedSuffixes;
    for (let i = 0; i < arr.length; i++) {
      const sel = document.getElementById(type + '-' + i);
      if (!sel) continue;
      const isEmpty = arr[i] < 0;
      sel.disabled = atCap && isEmpty;
      // Also disable the filter input
      const filterInput = sel.parentElement.querySelector('input');
      if (filterInput) filterInput.disabled = atCap && isEmpty;
    }
  }
}

function createAffixSelect(type, slotIndex, affixPool) {
  const div = document.createElement('div');
  div.className = 'affix-slot';

  const filter = document.createElement('input');
  filter.type = 'text';
  filter.className = 'affix-list-filter';
  filter.placeholder = 'Filter ' + type + '...';

  const sel = document.createElement('select');
  sel.id = type + '-' + slotIndex;

  function populateOptions() {
    const currentVal = sel.value;
    sel.innerHTML = '<option value="-1">-- None --</option>';
    const ft = (filter.value || '').toLowerCase();
    const usedGroups = getUsedGroups(type, slotIndex);

    affixPool.forEach((a, idx) => {
      // Skip if this affix's group is already used by another slot
      if (a.group && usedGroups.has(a.group)) return;
      // Build a description of what the affix does
      const desc = affixDescription(a);
      const label = a.Name + (desc ? ' — ' + desc : '') + ' (lvl ' + a.level + ')';
      if (ft && !label.toLowerCase().includes(ft)) return;
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = label;
      sel.appendChild(opt);
    });

    // Restore selection if still valid
    if (sel.querySelector('option[value="' + currentVal + '"]')) {
      sel.value = currentVal;
    }
  }

  // Store populate function on the element so siblings can trigger it
  sel._populate = populateOptions;

  populateOptions();

  filter.addEventListener('input', populateOptions);

  sel.addEventListener('change', function() {
    const arr = type === 'prefix' ? state.selectedPrefixes : state.selectedSuffixes;
    arr[slotIndex] = parseInt(this.value);
    refreshAffixSlots('prefix');
    refreshAffixSlots('suffix');
    enforceJewelCap();
    renderPreview();
  });

  div.appendChild(filter);
  div.appendChild(sel);
  return div;
}

function affixDescription(affix) {
  const parts = [];
  for (let i = 1; i <= 3; i++) {
    const code = affix['mod' + i + 'code'];
    if (!code) continue;
    const min = affix['mod' + i + 'min'];
    const max = affix['mod' + i + 'max'];
    const param = affix['mod' + i + 'param'];
    parts.push(formatMod(code, param, min, max));
  }
  return parts.join(', ');
}

// --- Preview rendering ---
function renderPreview() {
  const preview = document.getElementById('preview');
  const items = getCategoryItems();

  if (state.baseIndex < 0 || !state.category) {
    preview.innerHTML = '<div class="no-item">Select an item base and quality to begin</div>';
    stateToHash();
    return;
  }

  const item = items[state.baseIndex];
  if (!state.quality) {
    preview.innerHTML = '<div class="no-item">Select Magic or Rare quality</div>';
    stateToHash();
    return;
  }

  const validPrefixes = getValidAffixes(prefixes, item, state.quality);
  const validSuffixes = getValidAffixes(suffixes, item, state.quality);

  // Gather selected affixes
  const selPre = state.selectedPrefixes
    .filter(i => i >= 0)
    .map(i => validPrefixes[i])
    .filter(Boolean);
  const selSuf = state.selectedSuffixes
    .filter(i => i >= 0)
    .map(i => validSuffixes[i])
    .filter(Boolean);

  // Collect all affix mods for stat calculation
  const allAffixes = [...selPre, ...selSuf];
  let totalED = 0, flatMinDmg = 0, flatMaxDmg = 0;
  let totalAC = 0, flatAC = 0;
  for (const a of allAffixes) {
    for (let i = 1; i <= 3; i++) {
      const code = a['mod' + i + 'code'];
      const min = parseInt(a['mod' + i + 'min']) || 0;
      const max = parseInt(a['mod' + i + 'max']) || 0;
      if (code === 'dmg%') totalED += max;
      if (code === 'dmg-min') flatMinDmg += max;
      if (code === 'dmg-max') flatMaxDmg += max;
      if (code === 'ac%') totalAC += max;
      if (code === 'ac') flatAC += max;
    }
  }

  const ethMult = state.ethereal ? 1.25 : 1;

  // Build item name
  const nameClass = state.quality === 'magic' ? 'magic' : 'rare';
  let html = '';

  if (state.quality === 'rare') {
    html += '<div class="item-name ' + nameClass + '">' + esc(state.rareName) +
      ' <span class="reroll-btn" onclick="rerollRareName()" title="Reroll rare name">&#x21bb;</span></div>';
    html += '<div class="base-name">' + esc(item.name) + '</div>';
  } else {
    let itemName = '';
    if (selPre.length > 0) itemName += selPre[0].Name + ' ';
    itemName += item.name;
    if (selSuf.length > 0) itemName += ' ' + selSuf[0].Name;
    html += '<div class="item-name ' + nameClass + '">' + esc(itemName) + '</div>';
  }

  if (state.ethereal) {
    html += '<div class="ethereal-tag">Ethereal (Cannot Be Repaired)</div>';
  }

  // Base stats with affix calculations
  html += '<div class="base-stats">';
  if (state.category === 'armor') {
    const baseMin = Math.floor((parseInt(item.minac) || 0) * ethMult);
    const baseMax = Math.floor((parseInt(item.maxac) || 0) * ethMult);
    const effMin = Math.floor(baseMin * (1 + totalAC / 100)) + flatAC;
    const effMax = Math.floor(baseMax * (1 + totalAC / 100)) + flatAC;
    html += '<div>Defense: ' + effMin + '-' + effMax + '</div>';
  } else if (state.category === 'weapon') {
    const raw1hMin = parseInt(item.mindam) || 0;
    const raw1hMax = parseInt(item.maxdam) || 0;
    if (raw1hMin > 0 || raw1hMax > 0) {
      const base1hMin = Math.floor(raw1hMin * ethMult);
      const base1hMax = Math.floor(raw1hMax * ethMult);
      const eff1hMin = Math.floor(base1hMin * (1 + totalED / 100)) + flatMinDmg;
      const eff1hMax = Math.floor(base1hMax * (1 + totalED / 100)) + flatMaxDmg;
      html += '<div>One-Hand Damage: ' + eff1hMin + '-' + eff1hMax + '</div>';
    }
    const raw2hMin = parseInt(item['2handmindam']) || 0;
    const raw2hMax = parseInt(item['2handmaxdam']) || 0;
    if (raw2hMin > 0 || raw2hMax > 0) {
      const base2hMin = Math.floor(raw2hMin * ethMult);
      const base2hMax = Math.floor(raw2hMax * ethMult);
      const eff2hMin = Math.floor(base2hMin * (1 + totalED / 100)) + flatMinDmg;
      const eff2hMax = Math.floor(base2hMax * (1 + totalED / 100)) + flatMaxDmg;
      html += '<div>Two-Hand Damage: ' + eff2hMin + '-' + eff2hMax + '</div>';
    }
  }
  if (item.durability && item.nodurability !== '1') {
    html += '<div>Durability: ' + item.durability + '</div>';
  }
  html += '</div>';

  // Affix mods
  const allMods = [];
  for (const a of selPre) {
    for (let i = 1; i <= 3; i++) {
      const code = a['mod' + i + 'code'];
      if (code) allMods.push({ code, param: a['mod' + i + 'param'], min: a['mod' + i + 'min'], max: a['mod' + i + 'max'], type: 'prefix' });
    }
  }
  for (const a of selSuf) {
    for (let i = 1; i <= 3; i++) {
      const code = a['mod' + i + 'code'];
      if (code) allMods.push({ code, param: a['mod' + i + 'param'], min: a['mod' + i + 'min'], max: a['mod' + i + 'max'], type: 'suffix' });
    }
  }

  if (allMods.length > 0) {
    html += '<div class="separator"></div>';
    html += '<div class="affix-stats">';
    for (const m of allMods) {
      const cls = m.type + '-stat';
      let line = formatMod(m.code, m.param, m.min, m.max);
      html += '<div class="' + cls + ' mod-line">' + esc(line) + '</div>';
    }
    html += '</div>';
  }

  // Requirements
  html += '<div class="separator"></div>';
  html += '<div class="req">';
  // Compute required level: max of base item levelreq and all affix levelreqs
  let reqLvl = parseInt(item.levelreq) || 0;
  for (const a of allAffixes) {
    const aReq = parseInt(a.levelreq) || 0;
    if (aReq > reqLvl) reqLvl = aReq;
  }
  if (reqLvl > 0) html += '<div>Required Level: ' + reqLvl + '</div>';
  if (item.reqstr && item.reqstr !== '0') html += '<div>Required Strength: ' + item.reqstr + '</div>';
  if (item.reqdex && item.reqdex !== '0') html += '<div>Required Dexterity: ' + item.reqdex + '</div>';
  html += '</div>';

  // Odds section
  if (selPre.length > 0 || selSuf.length > 0) {
    const alvl = calcAlvl(state.ilvl, item);
    const eligPre = filterByAlvl(validPrefixes, alvl);
    const eligSuf = filterByAlvl(validSuffixes, alvl);
    const preTotalFreq = eligPre.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
    const sufTotalFreq = eligSuf.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);

    html += '<div class="separator"></div>';
    html += '<div class="odds-section">';
    html += '<h4>Roll Odds (alvl ' + alvl + ', ' + eligPre.length + ' prefixes / ' + eligSuf.length + ' suffixes in pool)</h4>';

    // Rare: 3 prefix slots, 3 suffix slots, all always roll
    // Magic: 1 prefix slot, 1 suffix slot, both always roll
    // Selected affixes can land in any slot (order doesn't matter)
    const isJewelRare = state.quality === 'rare' && state.category === 'jewel';
    const preSlots = state.quality === 'rare' ? 3 : 1;
    const sufSlots = state.quality === 'rare' ? 3 : 1;

    // Individual affix odds (per single roll from alvl-filtered pool)
    const preProbs = [];
    for (const a of selPre) {
      const eligible = affixEligibleAtAlvl(a, alvl);
      const freq = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
      const prob = eligible && preTotalFreq > 0 ? freq / preTotalFreq : 0;
      preProbs.push(prob);
      const ratio = prob > 0 ? Math.round(1 / prob) : 0;
      html += '<div class="odds-row">';
      html += '<span class="odds-label" title="' + esc(a.Name) + '">' + esc(a.Name) + (!eligible ? ' <span style="color:#cc4444;">(needs alvl ' + a.level + (a.maxlevel ? '-' + a.maxlevel : '+') + ')</span>' : '') + '</span>';
      html += '<span class="odds-pct">' + (eligible ? oddsText(ratio) : '<span style="color:#cc4444;">impossible</span>') + '</span>';
      html += '</div>';
    }

    const sufProbs = [];
    for (const a of selSuf) {
      const eligible = affixEligibleAtAlvl(a, alvl);
      const freq = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
      const prob = eligible && sufTotalFreq > 0 ? freq / sufTotalFreq : 0;
      sufProbs.push(prob);
      const ratio = prob > 0 ? Math.round(1 / prob) : 0;
      html += '<div class="odds-row">';
      html += '<span class="odds-label" title="' + esc(a.Name) + '">' + esc(a.Name) + (!eligible ? ' <span style="color:#cc4444;">(needs alvl ' + a.level + (a.maxlevel ? '-' + a.maxlevel : '+') + ')</span>' : '') + '</span>';
      html += '<span class="odds-pct">' + (eligible ? oddsText(ratio) : '<span style="color:#cc4444;">impossible</span>') + '</span>';
      html += '</div>';
    }

    // Combined odds: K specific affixes must appear somewhere in N slots
    // P ≈ P(N,K) × product(pi)  where P(N,K) = N!/(N-K)!
    // This accounts for the affixes landing in any slot order
    function permutations(n, k) {
      let result = 1;
      for (let i = 0; i < k; i++) result *= (n - i);
      return result;
    }

    let combinedProb = 1;
    if (isJewelRare) {
      // Rare jewel: 1 guaranteed prefix slot, 1 guaranteed suffix slot,
      // 2 wild slots that each independently pick prefix OR suffix pool.
      // For Np selected prefixes and Ns selected suffixes (Np+Ns <= 4):
      //   - 1 prefix must land in the guaranteed prefix slot
      //   - 1 suffix must land in the guaranteed suffix slot
      //   - remaining (Np-1) prefixes and (Ns-1) suffixes must land in
      //     the 2 wild slots, which can go either way
      const Np = preProbs.length;
      const Ns = sufProbs.length;
      // Product of all individual probabilities
      let prodPre = 1;
      for (const p of preProbs) prodPre *= p;
      let prodSuf = 1;
      for (const p of sufProbs) prodSuf *= p;
      // Guaranteed slots: any of the Np prefixes can fill it, any of Ns suffixes
      // Wild slots: the remaining affixes fill the 2 wild slots in any order
      const wildCount = (Np - 1) + (Ns - 1); // affixes that need wild slots
      const wildArrangements = wildCount <= 0 ? 1 : permutations(2, wildCount);
      combinedProb = prodPre * prodSuf * Np * Ns * wildArrangements;
    } else {
      if (preProbs.length > 0) {
        let p = permutations(preSlots, preProbs.length);
        for (const prob of preProbs) p *= prob;
        combinedProb *= p;
      }
      if (sufProbs.length > 0) {
        let p = permutations(sufSlots, sufProbs.length);
        for (const prob of sufProbs) p *= prob;
        combinedProb *= p;
      }
    }

    // Ethereal odds
    if (state.ethereal) {
      combinedProb *= (1 / 20);
      html += '<div class="odds-row">';
      html += '<span class="odds-label">Ethereal</span>';
      html += '<span class="odds-pct">1 in 20</span>';
      html += '</div>';
    }

    // Combined odds
    html += '<div class="odds-combined">';
    html += '<div class="label">Combined chance for these affixes</div>';
    const combinedRatio = combinedProb > 0 ? Math.round(1 / combinedProb) : 0;
    html += '<div class="value">' + oddsText(combinedRatio) + '</div>';
    html += '</div>';

    html += '</div>';
  }

  preview.innerHTML = html;
  stateToHash();
}

function formatMod(code, param, min, max) {
  // Per-level properties: param is in 8ths (or 1s for att/lvl)
  if (PER_LEVEL[code]) {
    const divisor = (code === 'att/lvl' || code === 'att-dem/lvl' || code === 'att-und/lvl') ? 1 : 8;
    const perLevel = param ? (parseInt(param) / divisor) : 0;
    const maxVal = Math.floor(perLevel * 99);
    const valStr = perLevel % 1 === 0 ? String(maxVal) : maxVal.toFixed(1);
    return PER_LEVEL[code].replace('{val}', valStr);
  }

  // Standard display template
  const template = MOD_DISPLAY[code];
  if (template) {
    const range = min && max ? (min === max ? min : min + '-' + max) : (min || max || '');
    return template.replace('{range}', range).replace('{param}', param || '');
  }

  // Fallback: use *desc from Properties data
  const prop = propMap[code];
  if (prop && prop['*desc']) {
    let desc = prop['*desc'];
    if (min || max) {
      const range = min && max ? (min === max ? min : min + '-' + max) : (min || max);
      desc += ': ' + range;
    }
    if (param) desc += ' (' + param + ')';
    return desc;
  }

  // Last resort: raw code
  let s = code;
  if (param) s += '(' + param + ')';
  if (min || max) {
    const range = min && max ? (min === max ? min : min + '-' + max) : (min || max);
    s += ': ' + range;
  }
  return s;
}

function oddsText(ratio) {
  if (ratio <= 0) return 'N/A';
  return '1 in ' + shortNum(ratio);
}

function shortNum(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(1).replace(/\.0$/, '') + 'T';
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toString();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- URL state serialization ---
function stateToHash() {
  if (state.baseIndex < 0 || !state.category || !state.quality) {
    history.replaceState(null, '', location.pathname);
    return;
  }
  const items = getCategoryItems();
  const item = items[state.baseIndex];
  const parts = ['b=' + item.code, 'q=' + state.quality[0]];
  if (state.ethereal) parts.push('e=1');
  if (state.ilvl !== 99) parts.push('i=' + state.ilvl);

  // Map selected valid-pool indices to global prefix/suffix indices
  const validPre = state._validPrefixes || [];
  const validSuf = state._validSuffixes || [];

  const preIds = state.selectedPrefixes
    .filter(i => i >= 0 && validPre[i])
    .map(i => prefixes.indexOf(validPre[i]))
    .filter(i => i >= 0);
  const sufIds = state.selectedSuffixes
    .filter(i => i >= 0 && validSuf[i])
    .map(i => suffixes.indexOf(validSuf[i]))
    .filter(i => i >= 0);

  if (preIds.length) parts.push('p=' + preIds.join('.'));
  if (sufIds.length) parts.push('s=' + sufIds.join('.'));

  // Rare name
  if (state.quality === 'rare' && state.rareName) {
    const nameParts = state.rareName.split(' ');
    if (nameParts.length >= 2) {
      const rpi = rarePrefixes.findIndex(r => r.name === nameParts[0]);
      const rsi = rareSuffixes.findIndex(r => r.name === nameParts.slice(1).join(' '));
      if (rpi >= 0 && rsi >= 0) parts.push('rn=' + rpi + '.' + rsi);
    }
  }

  history.replaceState(null, '', '#' + parts.join('&'));
}

function loadFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const params = {};
  for (const part of hash.split('&')) {
    const [k, v] = part.split('=');
    if (k && v) params[k] = v;
  }
  if (!params.b || !params.q) return;

  const code = params.b;
  const quality = params.q === 'r' ? 'rare' : 'magic';

  // Find the item by code in all data sources
  let category = '';
  let baseIndex = -1;

  baseIndex = armorData.findIndex(i => i.code === code);
  if (baseIndex >= 0) { category = 'armor'; }

  if (!category) {
    baseIndex = weaponData.findIndex(i => i.code === code);
    if (baseIndex >= 0) category = 'weapon';
  }

  if (!category) {
    // Check misc items
    const miscItem = miscItems.find(i => i.code === code);
    if (miscItem) {
      category = miscItem.category;
      const catItems = miscItems.filter(i => i.category === category);
      baseIndex = catItems.findIndex(i => i.code === code);
    }
  }

  if (!category || baseIndex < 0) return;

  // Set category
  state.category = category;
  document.getElementById('category').value = category;
  document.getElementById('category').dispatchEvent(new Event('change'));

  if (!isSimpleCategory(category)) {
    const items = getCategoryItems();
    const item = items[baseIndex];
    const tier = getItemTier(item);

    // Set tier
    document.getElementById('tier').value = tier;
    document.getElementById('tier').dispatchEvent(new Event('change'));

    // Set item class
    document.getElementById('item-class').value = item.type;
    document.getElementById('item-class').dispatchEvent(new Event('change'));
  }

  // Set base
  document.getElementById('base').value = baseIndex;
  document.getElementById('base').dispatchEvent(new Event('change'));

  // Set quality (without re-rolling rare name yet)
  state.quality = quality;
  state.ethereal = params.e === '1';
  document.getElementById('eth-check').checked = state.ethereal;
  state.ilvl = params.i ? Math.max(1, Math.min(99, parseInt(params.i) || 99)) : 99;
  document.getElementById('ilvl-input').value = state.ilvl;
  document.getElementById('ilvl-area').style.display = 'block';
  updateAlvlDisplay();
  state.selectedPrefixes = [];
  state.selectedSuffixes = [];
  document.getElementById('btn-magic').className = quality === 'magic' ? 'active-magic' : '';
  document.getElementById('btn-rare').className = quality === 'rare' ? 'active-rare' : '';

  // Restore rare name before building slots
  if (quality === 'rare' && params.rn) {
    const [rpi, rsi] = params.rn.split('.').map(Number);
    if (rarePrefixes[rpi] && rareSuffixes[rsi]) {
      state.rareName = rarePrefixes[rpi].name + ' ' + rareSuffixes[rsi].name;
    } else {
      state.rareName = rollRareName(item);
    }
  } else {
    state.rareName = '';
  }

  buildAffixSlots();

  // Restore affix selections
  const validPre = state._validPrefixes || [];
  const validSuf = state._validSuffixes || [];

  if (params.p) {
    const preIds = params.p.split('.').map(Number);
    for (let i = 0; i < preIds.length && i < state.selectedPrefixes.length; i++) {
      const affix = prefixes[preIds[i]];
      if (!affix) continue;
      const poolIdx = validPre.indexOf(affix);
      if (poolIdx >= 0) {
        state.selectedPrefixes[i] = poolIdx;
        const sel = document.getElementById('prefix-' + i);
        if (sel) { sel.value = poolIdx; }
      }
    }
    refreshAffixSlots('prefix');
  }

  if (params.s) {
    const sufIds = params.s.split('.').map(Number);
    for (let i = 0; i < sufIds.length && i < state.selectedSuffixes.length; i++) {
      const affix = suffixes[sufIds[i]];
      if (!affix) continue;
      const poolIdx = validSuf.indexOf(affix);
      if (poolIdx >= 0) {
        state.selectedSuffixes[i] = poolIdx;
        const sel = document.getElementById('suffix-' + i);
        if (sel) { sel.value = poolIdx; }
      }
    }
    refreshAffixSlots('suffix');
  }

  renderPreview();
}

// --- Init ---
console.log('Data loaded. Prefixes:', prefixes.length, 'Suffixes:', suffixes.length);
loadFromHash();
