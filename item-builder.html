function formatMod(code, param, min, max) {
  // Per-level properties: param is in 8ths (or 1s for att/lvl)
  if (PER_LEVEL[code]) {
    const divisor = (code === 'att/lvl' || code === 'att-dem/lvl' || code === 'att-und/lvl') ? 1 : 8;
    const perLevel = param ? (parseInt(param) / divisor) : 0;
    const maxVal = Math.floor(perLevel * 99);
    const valStr = perLevel % 1 === 0 ? String(maxVal) : maxVal.toFixed(1);
    return PER_LEVEL[code].replace('{val}', valStr);
  }

  // Standard display template
  const template = MOD_DISPLAY[code];
  if (template) {
    const range = min && max ? (min === max ? min : min + '-' + max) : (min || max || '');
    return template.replace('{range}', range).replace('{param}', param || '');
  }

  // Fallback: use *desc from Properties data
  const prop = propMap[code];
  if (prop && prop['*desc']) {
    let desc = prop['*desc'];
    if (min || max) {
      const range = min && max ? (min === max ? min : min + '-' + max) : (min || max);
      desc += ': ' + range;
    }
    if (param) desc += ' (' + param + ')';
    return desc;
  }

  // Last resort: raw code
  let s = code;
  if (param) s += '(' + param + ')';
  if (min || max) {
    const range = min && max ? (min === max ? min : min + '-' + max) : (min || max);
    s += ': ' + range;
  }
  return s;
}

function oddsText(ratio) {
  if (ratio <= 0) return 'N/A';
  return '1 in ' + shortNum(ratio);
}

// Find the contiguous range of ilvls that produce the same rounded "1 in X" combined odds
function findIlvlRange(item, validPre, validSuf, selPre, selSuf, quality, category, isEthereal, currentIlvl, lldMax) {
  function oddsAtIlvl(ilvl) {
    const alvl = calcAlvl(ilvl, item);
    const allSelected = [...selPre, ...selSuf];
    if (!allSelected.every(a => affixEligibleAtAlvl(a, alvl))) return 0;
    const ePre = filterByAlvl(validPre, alvl);
    const eSuf = filterByAlvl(validSuf, alvl);
    const ptf = ePre.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
    const stf = eSuf.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
    const pp = selPre.map(a => { const f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0); return ptf > 0 ? f / ptf : 0; });
    const sp = selSuf.map(a => { const f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0); return stf > 0 ? f / stf : 0; });
    const sd = getSlotDistribution(quality, category, ilvl);
    let prob = computeCombinedProb(sd, pp, sp);
    if (isEthereal) prob *= (1 / 20);
    if (lldMax !== undefined) {
      const lldPreFreq = ePre.filter(a => (parseInt(a.levelreq) || 0) <= lldMax).reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
      const lldSufFreq = eSuf.filter(a => (parseInt(a.levelreq) || 0) <= lldMax).reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
      const pPreLLD = ptf > 0 ? lldPreFreq / ptf : 1;
      const pSufLLD = stf > 0 ? lldSufFreq / stf : 1;
      let pLLD = 0;
      for (const config of sd) {
        const remPre = Math.max(0, config.pre - selPre.length);
        const remSuf = Math.max(0, config.suf - selSuf.length);
        pLLD += config.prob * Math.pow(pPreLLD, remPre) * Math.pow(pSufLLD, remSuf);
      }
      prob *= pLLD;
    }
    return prob;
  }
  const currentProb = oddsAtIlvl(currentIlvl);
  if (currentProb <= 0) return null;
  const currentRatio = Math.round(1 / currentProb);
  const currentText = shortNum(currentRatio);
  let lo = currentIlvl, hi = currentIlvl;
  for (let i = currentIlvl - 1; i >= 1; i--) {
    const p = oddsAtIlvl(i);
    if (p <= 0) break;
    const r = Math.round(1 / p);
    if (shortNum(r) !== currentText) break;
    lo = i;
  }
  for (let i = currentIlvl + 1; i <= 99; i++) {
    const p = oddsAtIlvl(i);
    if (p <= 0) break;
    const r = Math.round(1 / p);
    if (shortNum(r) !== currentText) break;
    hi = i;
  }
  return { lo, hi };
}

// Build ilvl breakdown table HTML — groups consecutive ilvls with the same rounded odds
function buildIlvlBreakdownExact(item, validPre, validSuf, selPre, selSuf, quality, category, isEthereal, currentIlvl, lldMax) {
  var rows = [];
  for (var ilvl = 1; ilvl <= 99; ilvl++) {
    var alvl = calcAlvl(ilvl, item);
    var allSelected = selPre.concat(selSuf);
    if (!allSelected.every(function(a) { return affixEligibleAtAlvl(a, alvl); })) continue;
    var ePre = filterByAlvl(validPre, alvl);
    var eSuf = filterByAlvl(validSuf, alvl);
    var ptf = ePre.reduce(function(s, a) { return s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)); }, 0);
    var stf = eSuf.reduce(function(s, a) { return s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)); }, 0);
    var pp = selPre.map(function(a) { var f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0); return ptf > 0 ? f / ptf : 0; });
    var sp = selSuf.map(function(a) { var f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0); return stf > 0 ? f / stf : 0; });
    var sd = getSlotDistribution(quality, category, ilvl);
    var prob = computeCombinedProb(sd, pp, sp);
    if (prob <= 0) continue;
    if (isEthereal) prob *= (1 / 20);
    if (lldMax !== undefined) {
      var lldPreFreq = ePre.filter(function(a) { return (parseInt(a.levelreq) || 0) <= lldMax; }).reduce(function(s, a) { return s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)); }, 0);
      var lldSufFreq = eSuf.filter(function(a) { return (parseInt(a.levelreq) || 0) <= lldMax; }).reduce(function(s, a) { return s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)); }, 0);
      var pPreLLD = ptf > 0 ? lldPreFreq / ptf : 1;
      var pSufLLD = stf > 0 ? lldSufFreq / stf : 1;
      var pLLD = 0;
      for (var ci = 0; ci < sd.length; ci++) {
        var remPre = Math.max(0, sd[ci].pre - selPre.length);
        var remSuf = Math.max(0, sd[ci].suf - selSuf.length);
        pLLD += sd[ci].prob * Math.pow(pPreLLD, remPre) * Math.pow(pSufLLD, remSuf);
      }
      prob *= pLLD;
    }
    var ratio = Math.round(1 / prob);
    var text = shortNum(ratio);
    rows.push({ ilvl: ilvl, alvl: alvl, text: text, ratio: ratio });
  }
  return buildBreakdownTable(rows, currentIlvl);
}

function buildIlvlBreakdownFuzzy(currentIlvl, lld) {
  var items = getCategoryItems();
  var item = items[state.baseIndex];
  var rows = [];
  var savedIlvl = state.ilvl;
  for (var ilvl = 1; ilvl <= 99; ilvl++) {
    state.ilvl = ilvl;
    var result = computeFuzzyOdds();
    if (!result) continue;
    var prob;
    if (lld) {
      if (result.totalCombinations <= 0 || result.lldValidCombinations <= 0) continue;
      prob = result.lldValidCombinations / result.totalCombinations * 100;
    } else {
      if (result.percentage <= 0) continue;
      prob = result.percentage;
    }
    var ratio = Math.round(100 / prob);
    var text = shortNum(ratio);
    rows.push({ ilvl: ilvl, alvl: calcAlvl(ilvl, item), text: text, ratio: ratio });
  }
  state.ilvl = savedIlvl;
  return buildBreakdownTable(rows, currentIlvl);
}

function buildBreakdownTable(rows, currentIlvl) {
  if (rows.length === 0) return '';
  // Group consecutive ilvls with the same shortNum text
  var groups = [];
  var g = { lo: rows[0].ilvl, hi: rows[0].ilvl, alvlLo: rows[0].alvl, alvlHi: rows[0].alvl, text: rows[0].text };
  for (var i = 1; i < rows.length; i++) {
    if (rows[i].text === g.text && rows[i].ilvl === g.hi + 1) {
      g.hi = rows[i].ilvl;
      g.alvlHi = rows[i].alvl;
    } else {
      groups.push(g);
      g = { lo: rows[i].ilvl, hi: rows[i].ilvl, alvlLo: rows[i].alvl, alvlHi: rows[i].alvl, text: rows[i].text };
    }
  }
  groups.push(g);
  var html = '<table><tr><th>ilvl</th><th>alvl</th><th>Odds</th></tr>';
  for (var j = 0; j < groups.length; j++) {
    var gr = groups[j];
    var isCurrent = currentIlvl >= gr.lo && currentIlvl <= gr.hi;
    html += '<tr' + (isCurrent ? ' class="current"' : '') + '>';
    html += '<td>' + (gr.lo === gr.hi ? gr.lo : gr.lo + '-' + gr.hi) + '</td>';
    html += '<td>' + (gr.alvlLo === gr.alvlHi ? gr.alvlLo : gr.alvlLo + '-' + gr.alvlHi) + '</td>';
    html += '<td>1 in ' + gr.text + '</td>';
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

function toggleIlvlBreakdown(id, mode) {
  var el = document.getElementById(id);
  if (!el) return;
  if (el.style.display === 'none') {
    // Compute on first show or if empty (state changed since last render)
    if (!el.innerHTML) {
      // Show spinner while computing breakdown
      el.style.display = '';
      el.innerHTML = '<div style="text-align:center; padding:12px;"><span class="btn-spinner" style="width:18px; height:18px;"></span></div>';
      // Find and update the button text
      var btn = el.previousElementSibling ? el.previousElementSibling.querySelector('.ilvl-breakdown-btn') : null;
      if (btn) { btn.disabled = true; }
      // Defer computation so spinner renders first
      setTimeout(function() {
        computeIlvlBreakdown(el, mode);
        if (btn) { btn.disabled = false; }
      }, 0);
    } else {
      el.style.display = '';
    }
  } else {
    el.style.display = 'none';
  }
}

function computeIlvlBreakdown(el, mode) {
  var items = getCategoryItems();
  var item = items[state.baseIndex];
  if (!item) return;

  var html = '';
  if (mode === 'fuzzy') {
    html += buildIlvlBreakdownFuzzy(state.ilvl, false);
    // Check if LLD applies
    var pool = state._fuzzyPool || [];
    var sel = [];
        for (var fsi2 = 0; fsi2 < state.fuzzySections.length; fsi2++) {
          var secAff2 = state.fuzzySections[fsi2].affixes.filter(function(i) { return i >= 0; }).map(function(i) { return pool[i]; }).filter(Boolean);
          sel = sel.concat(secAff2);
        }
    var baseLLD = (parseInt(item.levelreq) || 0) <= 30;
    if (baseLLD && sel.length > 0 && sel.every(function(a) { return (parseInt(a.levelreq) || 0) <= 30; })) {
      // Check if there are actually LLD combinations
      var testResult = computeFuzzyOdds();
      if (testResult && testResult.lldValidCombinations > 0) {
        html += '<div style="margin-top:8px; color:#d4b44a; font-size:0.8rem; font-family:\'Exocet\',serif;">LLD Breakdown</div>';
        html += buildIlvlBreakdownFuzzy(state.ilvl, true);
      }
    }
  } else {
    var validPre = state._validPrefixes || [];
    var validSuf = state._validSuffixes || [];
    var selPre = state.selectedPrefixes.filter(function(i) { return i >= 0; }).map(function(i) { return validPre[i]; }).filter(Boolean);
    var selSuf = state.selectedSuffixes.filter(function(i) { return i >= 0; }).map(function(i) { return validSuf[i]; }).filter(Boolean);
    html += buildIlvlBreakdownExact(item, validPre, validSuf, selPre, selSuf, state.quality, state.category, state.ethereal, state.ilvl);
    // Check if LLD applies
    var LLD_MAX = 30;
    var allSel = selPre.concat(selSuf);
    if (allSel.length > 0 && (parseInt(item.levelreq) || 0) <= LLD_MAX && allSel.every(function(a) { return (parseInt(a.levelreq) || 0) <= LLD_MAX; })) {
      html += '<div style="margin-top:8px; color:#d4b44a; font-size:0.8rem; font-family:\'Exocet\',serif;">LLD Breakdown</div>';
      html += buildIlvlBreakdownExact(item, validPre, validSuf, selPre, selSuf, state.quality, state.category, state.ethereal, state.ilvl, LLD_MAX);
    }
  }
  el.innerHTML = html;
}

function shortNum(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(1).replace(/\.0$/, '') + 'T';
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toString();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- URL state serialization ---
function stateToHash() {
  if (state.baseIndex < 0 || !state.category || !state.quality) {
    history.replaceState(null, '', location.pathname);
    return;
  }
  const items = getCategoryItems();
  const item = items[state.baseIndex];
  const parts = ['b=' + item.code, 'q=' + state.quality[0]];
  if (state.ethereal) parts.push('e=1');
  if (state.ilvl !== 99) parts.push('i=' + state.ilvl);

  // Map selected valid-pool indices to global prefix/suffix indices
  const validPre = state._validPrefixes || [];
  const validSuf = state._validSuffixes || [];

  const preIds = state.selectedPrefixes
    .filter(i => i >= 0 && validPre[i])
    .map(i => prefixes.indexOf(validPre[i]))
    .filter(i => i >= 0);
  const sufIds = state.selectedSuffixes
    .filter(i => i >= 0 && validSuf[i])
    .map(i => suffixes.indexOf(validSuf[i]))
    .filter(i => i >= 0);

  if (preIds.length) parts.push('p=' + preIds.join('.'));
  if (sufIds.length) parts.push('s=' + sufIds.join('.'));

  // Fuzzy mode
  if (state.affixMode === 'fuzzy') parts.push('m=f');
  if (state.affixMode === 'fuzzy' && state.fuzzySections.length > 0) {
    const pool = state._fuzzyPool || [];
    const sectionParts = [];
    for (let fsi = 0; fsi < state.fuzzySections.length; fsi++) {
      const sec = state.fuzzySections[fsi];
      const faIds = sec.affixes.filter(i => i >= 0 && pool[i]).map(i => {
        const a = pool[i];
        if (a._poolType === 'prefix') { const gi = prefixes.findIndex(p => p.Name === a.Name && p.group === a.group); return gi >= 0 ? 'p' + gi : null; }
        else { const gi = suffixes.findIndex(s => s.Name === a.Name && s.group === a.group); return gi >= 0 ? 's' + gi : null; }
      }).filter(Boolean);
      if (faIds.length > 0) sectionParts.push(sec.min + ':' + faIds.join('.'));
    }
    if (sectionParts.length) parts.push('fs=' + sectionParts.join('|'));
    if (state.fuzzySections.length === 1 && state.fuzzySections[0].min > 1) parts.push('fm=' + state.fuzzySections[0].min);
    if (state.fuzzySections.length === 1) {
      const sec0 = state.fuzzySections[0];
      const fa0Ids = sec0.affixes.filter(i => i >= 0 && pool[i]).map(i => {
        const a = pool[i];
        if (a._poolType === 'prefix') { const gi = prefixes.findIndex(p => p.Name === a.Name && p.group === a.group); return gi >= 0 ? 'p' + gi : null; }
        else { const gi = suffixes.findIndex(s => s.Name === a.Name && s.group === a.group); return gi >= 0 ? 's' + gi : null; }
      }).filter(Boolean);
      if (fa0Ids.length) parts.push('fa=' + fa0Ids.join('.'));
    }
  }

  // Rare name
  if ((state.quality === 'rare' || state.quality === 'crafted') && state.rareName) {
    const nameParts = state.rareName.split(' ');
    if (nameParts.length >= 2) {
      const rpi = rarePrefixes.findIndex(r => r.name === nameParts[0]);
      const rsi = rareSuffixes.findIndex(r => r.name === nameParts.slice(1).join(' '));
      if (rpi >= 0 && rsi >= 0) parts.push('rn=' + rpi + '.' + rsi);
    }
  }

  history.replaceState(null, '', '#' + parts.join('&'));
}

function loadFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const params = {};
  for (const part of hash.split('&')) {
    const [k, v] = part.split('=');
    if (k && v) params[k] = v;
  }
  if (!params.b || !params.q) return;

  const code = params.b;
  const quality = params.q === 'r' ? 'rare' : params.q === 'c' ? 'crafted' : 'magic';

  // Find the item by code in all data sources
  let category = '';
  let baseIndex = -1;

  baseIndex = armorData.findIndex(i => i.code === code);
  if (baseIndex >= 0) { category = 'armor'; }

  if (!category) {
    baseIndex = weaponData.findIndex(i => i.code === code);
    if (baseIndex >= 0) category = 'weapon';
  }

  if (!category) {
    // Check misc items
    const miscItem = miscItems.find(i => i.code === code);
    if (miscItem) {
      category = miscItem.category;
      const catItems = miscItems.filter(i => i.category === category);
      baseIndex = catItems.findIndex(i => i.code === code);
    }
  }

  if (!category || baseIndex < 0) return;

  // Set category
  state.category = category;
  document.getElementById('category').value = category;
  document.getElementById('category').dispatchEvent(new Event('change'));

  if (!isSimpleCategory(category)) {
    const items = getCategoryItems();
    const item = items[baseIndex];
    const tier = getItemTier(item);

    // Set tier
    document.getElementById('tier').value = tier;
    document.getElementById('tier').dispatchEvent(new Event('change'));

    // Set item class
    document.getElementById('item-class').value = item.type;
    document.getElementById('item-class').dispatchEvent(new Event('change'));
  }

  // Set base
  document.getElementById('base').value = baseIndex;
  document.getElementById('base').dispatchEvent(new Event('change'));

  // Set quality (without re-rolling rare name yet)
  state.quality = quality;
  state.ethereal = params.e === '1';
  document.getElementById('eth-check').checked = state.ethereal;
  state.ilvl = params.i ? Math.max(1, Math.min(99, parseInt(params.i) || 99)) : 99;
  document.getElementById('ilvl-input').value = state.ilvl;
  document.getElementById('ilvl-area').style.display = 'block';
  document.getElementById('mode-area').style.display = 'block';
  updateAlvlDisplay();
  state.selectedPrefixes = [];
  state.selectedSuffixes = [];
  document.getElementById('btn-magic').className = quality === 'magic' ? 'active-magic' : '';
  document.getElementById('btn-rare').className = quality === 'rare' ? 'active-rare' : '';
  document.getElementById('btn-crafted').className = quality === 'crafted' ? 'active-crafted' : '';

  // Restore rare name before building slots
  if ((quality === 'rare' || quality === 'crafted') && params.rn) {
    const [rpi, rsi] = params.rn.split('.').map(Number);
    if (rarePrefixes[rpi] && rareSuffixes[rsi]) {
      state.rareName = rarePrefixes[rpi].name + ' ' + rareSuffixes[rsi].name;
    } else {
      state.rareName = rollRareName(item);
    }
  } else if (quality === 'rare' || quality === 'crafted') {
    const items2 = getCategoryItems();
    state.rareName = rollRareName(items2[baseIndex]);
  } else {
    state.rareName = '';
  }

  // Restore fuzzy mode if present
  if (params.m === 'f') {
    state.affixMode = 'fuzzy';
    if (params.fs) {
      const pool = state._fuzzyPool || [];
      const sectionTokens = params.fs.split('|');
      state.fuzzySections = [];
      for (const secTok of sectionTokens) {
        const colonIdx = secTok.indexOf(':');
        const secMin = colonIdx >= 0 ? Math.max(1, parseInt(secTok.substring(0, colonIdx)) || 1) : 1;
        const affixStr = colonIdx >= 0 ? secTok.substring(colonIdx + 1) : secTok;
        const faTokens = affixStr.split('.');
        const secAffixes = [];
        for (const tok of faTokens) {
          const type = tok[0]; const gi = parseInt(tok.slice(1));
          const affix = type === 'p' ? prefixes[gi] : suffixes[gi];
          if (!affix) { secAffixes.push(-1); continue; }
          const poolIdx = pool.findIndex(a => a.Name === affix.Name && a.group === affix.group && a._poolType === (type === 'p' ? 'prefix' : 'suffix'));
          secAffixes.push(poolIdx >= 0 ? poolIdx : -1);
        }
        state.fuzzySections.push({ affixes: secAffixes, min: secMin });
      }
      syncLegacyFuzzyState();
      setAffixMode('fuzzy');
      buildFuzzySections();
    } else if (params.fa) {
      const pool = state._fuzzyPool || [];
      const faTokens = params.fa.split('.');
      const secAffixes = [];
      for (const tok of faTokens) {
        const type = tok[0]; const gi = parseInt(tok.slice(1));
        const affix = type === 'p' ? prefixes[gi] : suffixes[gi];
        if (!affix) { secAffixes.push(-1); continue; }
        const poolIdx = pool.findIndex(a => a.Name === affix.Name && a.group === affix.group && a._poolType === (type === 'p' ? 'prefix' : 'suffix'));
        secAffixes.push(poolIdx >= 0 ? poolIdx : -1);
      }
      state.fuzzyMin = params.fm ? Math.max(1, parseInt(params.fm) || 1) : 1;
      state.fuzzySections = [{ affixes: secAffixes, min: state.fuzzyMin }];
      state.fuzzyAffixes = secAffixes.slice();
      setAffixMode('fuzzy');
      buildFuzzySections();
    } else {
      setAffixMode('fuzzy');
    }
  } else {
    buildAffixSlots();

    // Restore affix selections
    const validPre = state._validPrefixes || [];
    const validSuf = state._validSuffixes || [];

    if (params.p) {
      const preIds = params.p.split('.').map(Number);
      for (let i = 0; i < preIds.length && i < state.selectedPrefixes.length; i++) {
        const affix = prefixes[preIds[i]];
        if (!affix) continue;
        const poolIdx = validPre.indexOf(affix);
        if (poolIdx >= 0) {
          state.selectedPrefixes[i] = poolIdx;
          const sel = document.getElementById('prefix-' + i);
          if (sel) { sel.value = poolIdx; }
        }
      }
      refreshAffixSlots('prefix');
    }

    if (params.s) {
      const sufIds = params.s.split('.').map(Number);
      for (let i = 0; i < sufIds.length && i < state.selectedSuffixes.length; i++) {
        const affix = suffixes[sufIds[i]];
        if (!affix) continue;
        const poolIdx = validSuf.indexOf(affix);
        if (poolIdx >= 0) {
          state.selectedSuffixes[i] = poolIdx;
          const sel = document.getElementById('suffix-' + i);
          if (sel) { sel.value = poolIdx; }
        }
      }
      refreshAffixSlots('suffix');
    }
  }

  renderPreview();
}

// --- Init ---
console.log('Data loaded. Prefixes:', prefixes.length, 'Suffixes:', suffixes.length);
loadFromHash();
</script>
