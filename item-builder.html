<body>
<h1>PD2 Theoretical Item Builder</h1>
<div class="top-links">
  <a href="https://maaaaaarrk.github.io/Hiim-PD2-Resources/" target="_blank">Hiim PD2 Resources</a>
  <a href="https://github.com/Maaaaaarrk/pd2_item/issues" target="_blank" class="report-btn">Report an Issue</a>
</div>

  <!-- Left Panel: Selection -->

      <option value="">-- Select --</option>
      <option value="armor">Armor</option>
      <option value="weapon">Weapon</option>
      <option value="ring">Ring</option>
      <option value="amulet">Amulet</option>
      <option value="jewel">Jewel</option>
      <option value="charm">Charm</option>
    </select>

    <label for="tier">Tier</label>
    <select id="tier" disabled>
      <option value="">-- Select category first --</option>
    </select>

    <label for="item-class">Item Class</label>
    <select id="item-class" disabled>
      <option value="">-- Select tier first --</option>
    </select>

    <label for="base">Item Base</label>
    <select id="base" disabled>
      <option value="">-- Select class first --</option>
    </select>

    <label>Quality</label>
    <div class="quality-btns">
      <button id="btn-magic" disabled onclick="setQuality('magic')">Magic</button>
      <button id="btn-rare" disabled onclick="setQuality('rare')">Rare</button>
      <button id="btn-crafted" disabled onclick="setQuality('crafted')">Crafted</button>
    </div>

    <div id="ethereal-area" style="display:none; margin-top: 10px;">
      <label class="eth-toggle"><input type="checkbox" id="eth-check" onchange="toggleEthereal()"> Ethereal (+25% base stats, 1 in 20)</label>
    </div>

    <div id="mode-area" style="display:none; margin-top: 10px;">
      <div class="mode-toggle">
        <span>Mode:</span>
        <label><input type="radio" name="affix-mode" value="exact" checked onchange="setAffixMode('exact')"> Exact Affixes</label>
        <label><input type="radio" name="affix-mode" value="fuzzy" onchange="setAffixMode('fuzzy')"> Fuzzy Affixes</label>
      </div>
    </div>

    <div id="fuzzy-controls" style="display:none; margin-top: 10px;">
    </div>

    <div id="ilvl-area" style="display:none; margin-top: 10px;">
      <label for="ilvl-input">Item Level (ilvl) <span id="alvl-display" style="color:#888; font-size:0.8rem;"></span></label>
      <div style="display:flex; gap:6px; align-items:center;">
        <input type="number" id="ilvl-input" min="1" max="99" value="99" style="flex:1;" onchange="onIlvlChange()" oninput="onIlvlChange()">
        <button id="btn-optimal" onclick="findOptimalIlvl()" style="padding:6px 10px; background:#0f3460; border:1px solid #1a4080; color:#c4a84f; border-radius:4px; cursor:pointer; font-size:0.8rem; white-space:nowrap;">Best ilvl</button>
        <button id="btn-optimal-lld" onclick="findOptimalIlvl(true)" style="padding:6px 10px; background:#0f3460; border:1px solid #1a4080; color:#c4a84f; border-radius:4px; cursor:pointer; font-size:0.8rem; white-space:nowrap; display:none;">Best ilvl LLD</button>

      <div class="affix-section">

        <div id="prefix-slots"></div>
      </div>
      <div class="affix-section">
        <h3 id="suffix-header">Suffixes</h3>
        <div id="suffix-slots"></div>
      </div>
    </div>

      <div class="affix-section">
        <h3>Fuzzy Affix Sections</h3>

  <!-- Right Panel: Preview -->

<script>
// --- Data from global JS files ---
let armorData = ARMOR_DATA;
let weaponData = WEAPONS_DATA;
let itemTypes = ITEM_TYPES_DATA;
let prefixes = MAGIC_PREFIX_DATA.filter(a => a.Name && a.spawnable !== '0');
let suffixes = MAGIC_SUFFIX_DATA.filter(a => a.Name && a.spawnable !== '0');
let typeMap = {};
for (const t of itemTypes) { if (t.Code) typeMap[t.Code] = t; }
let rarePrefixes = RARE_PREFIX_DATA.filter(a => a.name);
let rareSuffixes = RARE_SUFFIX_DATA.filter(a => a.name);

// Misc items that aren't in Armor/Weapons data
const miscItems = [
  { name: 'Ring', code: 'rin', type: 'ring', level: '1', levelreq: '0', category: 'ring' },
  { name: 'Amulet', code: 'amu', type: 'amul', level: '1', levelreq: '0', category: 'amulet' },
  { name: 'Jewel', code: 'jew', type: 'jewl', level: '1', levelreq: '0', category: 'jewel' },
  { name: 'Small Charm', code: 'cm1', type: 'scha', level: '1', levelreq: '0', category: 'charm' },
  { name: 'Large Charm', code: 'cm2', type: 'mcha', level: '1', levelreq: '0', category: 'charm' },
  { name: 'Grand Charm', code: 'cm3', type: 'lcha', level: '1', levelreq: '0', category: 'charm' },
];

let state = { category: '', tier: '', itemClass: '', baseIndex: -1, quality: '', ethereal: false, ilvl: 99, selectedPrefixes: [], selectedSuffixes: [], rareName: '', affixMode: 'exact', fuzzyMin: 1, fuzzyAffixes: [], fuzzySections: [{ affixes: [], min: 1 }] };

// --- Tier detection: Normal / Exceptional / Elite ---
function getItemTier(item) {
  const code = item.code;
  if (code && item.ultracode && code === item.ultracode && code !== item.normcode) return 'elite';
  if (code && item.ubercode && code === item.ubercode && code !== item.normcode) return 'exceptional';
  return 'normal';
}

// --- Get display name for a type code from ItemTypes ---
function getTypeDisplayName(typeCode) {
  const entry = typeMap[typeCode];
  return entry ? entry.ItemType : typeCode;
}

// --- Rare name generation ---
function getValidRareNames(nameList, item) {
  const { fullChain, direct } = getItemTypeSets(item);
  return nameList.filter(a => affixMatchesItem(a, fullChain, direct));
}

function rollRareName(item) {
  const validPre = getValidRareNames(rarePrefixes, item);
  const validSuf = getValidRareNames(rareSuffixes, item);
  if (validPre.length === 0 || validSuf.length === 0) return 'Rare ' + item.name;
  const pre = validPre[Math.floor(Math.random() * validPre.length)];
  const suf = validSuf[Math.floor(Math.random() * validSuf.length)];
  return pre.name + ' ' + suf.name;
}

// --- Type hierarchy: get all type codes for an item (its type + all ancestors) ---
function getTypeChain(typeCode) {
  const chain = new Set();
  const visited = new Set();
  const queue = [typeCode];
  while (queue.length) {
    const code = queue.shift();
    if (!code || visited.has(code)) continue;
    visited.add(code);
    chain.add(code);
    const entry = typeMap[code];
    if (entry) {
      if (entry.Equiv1) queue.push(entry.Equiv1);
      if (entry.Equiv2) queue.push(entry.Equiv2);
    }
  }
  return chain;
}

// --- Check if an affix can appear on an item ---
// itype check uses full ancestor chain, etype check uses direct types only
function affixMatchesItem(affix, fullTypeChain, directTypes) {
  // Collect affix's included types
  const itypes = [];
  for (let i = 1; i <= 7; i++) {
    const v = affix['itype' + i];
    if (v) itypes.push(v);
  }
  if (itypes.length === 0) return false;

  // Collect affix's excluded types
  const etypes = [];
  for (let i = 1; i <= 5; i++) {
    const v = affix['etype' + i];
    if (v) etypes.push(v);
  }

  // Item must match at least one itype (full ancestor chain)
  const matches = itypes.some(it => fullTypeChain.has(it));
  if (!matches) return false;

  // Item must NOT match any etype (direct types only)
  const excluded = etypes.some(et => directTypes.has(et));
  return !excluded;
}

// --- Build both type sets for an item ---
function getItemTypeSets(item) {
  const types1 = getTypeChain(item.type);
  const types2 = item.type2 ? getTypeChain(item.type2) : new Set();
  const fullChain = new Set([...types1, ...types2]);
  const direct = new Set();
  if (item.type) direct.add(item.type);
  if (item.type2) direct.add(item.type2);
  return { fullChain, direct };
}

// --- alvl calculation (from d2mods.info article 234) ---
function calcAlvl(ilvl, item) {
  let il = Math.min(ilvl, 99);
  const qlvl = parseInt(item.level) || 0;
  const magicLvl = parseInt(item['magic lvl']) || 0;
  if (qlvl > il) il = qlvl;
  let alvl;
  if (magicLvl > 0) {
    alvl = il + magicLvl;
  } else {
    if (il < (99 - Math.floor(qlvl / 2))) {
      alvl = il - Math.floor(qlvl / 2);
    } else {
      alvl = 2 * il - 99;
    }
  }
  return Math.min(alvl, 99);
}

// --- Check if affix is eligible at a given alvl ---
function affixEligibleAtAlvl(affix, alvl) {
  const affixLvl = parseInt(affix.level) || 0;
  const affixMaxLvl = affix.maxlevel ? parseInt(affix.maxlevel) : 99;
  return affixLvl <= alvl && alvl <= affixMaxLvl;
}

// --- Get valid affixes for an item base + quality (type match only, no ilvl filter) ---
function getValidAffixes(affixList, item, quality) {
  const { fullChain, direct } = getItemTypeSets(item);

  return affixList.filter(a => {
    if (a.frequency === '0') return false;
    if ((quality === 'rare' || quality === 'crafted') && a.rare !== '1') return false;
    return affixMatchesItem(a, fullChain, direct);
  });
}

// --- Filter a valid affix list by alvl eligibility ---
function filterByAlvl(affixList, alvl) {
  return affixList.filter(a => affixEligibleAtAlvl(a, alvl));
}

// --- Affix count distribution helpers ---
function binomCoeff(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  let r = 1;
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1);
  return r;
}

function permutations(n, k) {
  let r = 1;
  for (let i = 0; i < k; i++) r *= (n - i);
  return r;
}

// Returns array of { pre, suf, prob } for all possible slot configurations
function getSlotDistribution(quality, category, ilvl) {
  if (quality === 'magic') {
    let threshold;
    if (category === 'armor' || category === 'weapon') threshold = 65;
    else if (category === 'charm') threshold = 90;
    else threshold = 85; // ring, amulet, jewel
    if (ilvl >= threshold) {
      return [{ pre: 1, suf: 1, prob: 1 }];
    }
    // Below threshold: each slot 50% independent, at least 1 guaranteed
    return [
      { pre: 1, suf: 1, prob: 0.25 },
      { pre: 1, suf: 0, prob: 0.375 },
      { pre: 0, suf: 1, prob: 0.375 }
    ];
  }
  if (quality === 'rare') {
    if (category === 'jewel') return rareSlotDist(4, 4);
    let min;
    if (ilvl >= 85) min = 6;
    else if (ilvl >= 65) min = 5;
    else if (ilvl >= 45) min = 4;
    else min = 3;
    return rareSlotDist(min, 6);
  }
  if (quality === 'crafted') {
    // Crafted: 1-4 additional affixes with specific ilvl-based distribution
    // These are distributed as prefix/suffix with max 3 each
    return craftedSlotDist(ilvl);
  }
  return [{ pre: 0, suf: 0, prob: 1 }];
}

function rareSlotDist(minTotal, maxTotal) {
  const extraSlots = maxTotal - minTotal;
  const merged = {};
  for (let extra = 0; extra <= extraSlots; extra++) {
    const N = minTotal + extra;
    const pN = binomCoeff(extraSlots, extra) * Math.pow(0.5, extraSlots);
    const wild = N - 2;
    for (let wp = 0; wp <= wild; wp++) {
      let nPre = 1 + wp, nSuf = 1 + (wild - wp);
      if (nPre > 3) { nSuf += nPre - 3; nPre = 3; }
      if (nSuf > 3) { nPre += nSuf - 3; nSuf = 3; }
      const pWild = binomCoeff(wild, wp) * Math.pow(0.5, wild);
      const key = nPre + ',' + nSuf;
      if (!merged[key]) merged[key] = { pre: nPre, suf: nSuf, prob: 0 };
      merged[key].prob += pN * pWild;
    }
  }
  return Object.values(merged);
}

function craftedSlotDist(ilvl) {
  // Crafted affix count probabilities by ilvl
  // These are ADDITIONAL affixes (on top of predetermined crafted mods)
  let countProbs;
  if (ilvl >= 71) {
    countProbs = [{ n: 4, prob: 1 }];
  } else if (ilvl >= 51) {
    countProbs = [{ n: 3, prob: 0.8 }, { n: 4, prob: 0.2 }];
  } else if (ilvl >= 31) {
    countProbs = [{ n: 2, prob: 0.6 }, { n: 3, prob: 0.2 }, { n: 4, prob: 0.2 }];
  } else {
    countProbs = [{ n: 1, prob: 0.4 }, { n: 2, prob: 0.2 }, { n: 3, prob: 0.2 }, { n: 4, prob: 0.2 }];
  }

  // For each count, distribute into prefix/suffix (each slot 50/50, max 3 each)
  const merged = {};
  for (const cp of countProbs) {
    for (let wp = 0; wp <= cp.n; wp++) {
      let nPre = wp, nSuf = cp.n - wp;
      if (nPre > 3) { nSuf += nPre - 3; nPre = 3; }
      if (nSuf > 3) { nPre += nSuf - 3; nSuf = 3; }
      const pWild = binomCoeff(cp.n, wp) * Math.pow(0.5, cp.n);
      const key = nPre + ',' + nSuf;
      if (!merged[key]) merged[key] = { pre: nPre, suf: nSuf, prob: 0 };
      merged[key].prob += cp.prob * pWild;
    }
  }
  return Object.values(merged);
}

// Compute combined probability of Kpre specific prefixes + Ksuf specific suffixes
function computeCombinedProb(slotDist, preProbs, sufProbs) {
  let totalProb = 0;
  for (const config of slotDist) {
    if (config.pre < preProbs.length || config.suf < sufProbs.length) continue;
    let p = config.prob;
    p *= permutations(config.pre, preProbs.length);
    for (const pp of preProbs) p *= pp;
    p *= permutations(config.suf, sufProbs.length);
    for (const sp of sufProbs) p *= sp;
    totalProb += p;
  }
  return totalProb;
}

// Get affix count description string for display
function getAffixCountDesc(quality, category, ilvl) {
  if (quality === 'magic') {
    let threshold;
    if (category === 'armor' || category === 'weapon') threshold = 65;
    else if (category === 'charm') threshold = 90;
    else threshold = 85;
    return ilvl >= threshold ? '2 affixes' : '1-2 affixes';
  }
  if (quality === 'rare') {
    if (category === 'jewel') return '4 affixes';
    if (ilvl >= 85) return '6 affixes';
    if (ilvl >= 65) return '5-6 affixes';
    if (ilvl >= 45) return '4-6 affixes';
    return '3-6 affixes';
  }
  if (quality === 'crafted') {
    if (ilvl >= 71) return '4 affixes + crafted mods';
    if (ilvl >= 51) return '3-4 affixes + crafted mods';
    if (ilvl >= 31) return '2-4 affixes + crafted mods';
    return '1-4 affixes + crafted mods';
  }
  return '';
}

// Categories that skip tier/class selection and go straight to item pick
const simpleCats = ['ring', 'amulet', 'jewel', 'charm'];

function isSimpleCategory(cat) {
  return simpleCats.includes(cat);
}

function getCategoryItems() {
  if (state.category === 'armor') return armorData;
  if (state.category === 'weapon') return weaponData;
  return miscItems.filter(i => i.category === state.category);
}

// --- UI handlers ---
document.getElementById('category').addEventListener('change', function() {
  state.category = this.value;
  resetFrom('tier');
  if (!state.category) return;

  if (isSimpleCategory(state.category)) {
    // Skip tier/class, go straight to base selection
    const baseSel = document.getElementById('base');
    baseSel.disabled = false;
    baseSel.innerHTML = '<option value="">-- Select item --</option>';

    const items = getCategoryItems();
    items.forEach((item, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = item.name;
      baseSel.appendChild(opt);
    });
    // Auto-select if only one item
    if (items.length === 1) {
      baseSel.value = 0;
      baseSel.dispatchEvent(new Event('change'));
    }
    return;
  }

  const tierSel = document.getElementById('tier');
  tierSel.disabled = false;
  tierSel.innerHTML = '<option value="">-- Select tier --</option>';

  const items = getCategoryItems().filter(i => i.name && i.name.trim());
  // Determine which tiers exist
  const tiers = new Set(items.map(i => getItemTier(i)));
  const tierLabels = { normal: 'Normal', exceptional: 'Exceptional', elite: 'Elite' };
  for (const t of ['normal', 'exceptional', 'elite']) {
    if (tiers.has(t)) {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = tierLabels[t];
      tierSel.appendChild(opt);
    }
  }
});

document.getElementById('tier').addEventListener('change', function() {
  state.tier = this.value;
  resetFrom('class');
  if (!state.tier) return;

  const classSel = document.getElementById('item-class');
  classSel.disabled = false;
  classSel.innerHTML = '<option value="">-- Select class --</option>';

  const items = getCategoryItems().filter(i => i.name && i.name.trim() && getItemTier(i) === state.tier);
  // Get unique type codes in order of first appearance
  const seen = new Set();
  const typeOrder = [];
  for (const item of items) {
    if (!seen.has(item.type)) {
      seen.add(item.type);
      typeOrder.push(item.type);
    }
  }
  for (const tc of typeOrder) {
    const opt = document.createElement('option');
    opt.value = tc;
    opt.textContent = getTypeDisplayName(tc);
    classSel.appendChild(opt);
  }
});

document.getElementById('item-class').addEventListener('change', function() {
  state.itemClass = this.value;
  resetFrom('base');
  if (!state.itemClass) return;

  const baseSel = document.getElementById('base');
  baseSel.disabled = false;
  baseSel.innerHTML = '<option value="">-- Select item --</option>';

function findOptimalIlvl(lld) {
  const btnId = lld ? 'btn-optimal-lld' : 'btn-optimal';
  const btn = document.getElementById(btnId);
  if (btn.disabled) return;
  if (state.baseIndex < 0 || !state.quality) return;

  // Show spinner and disable button
  btn.disabled = true;
  const savedText = btn.textContent;
  btn.innerHTML = '<span class="btn-spinner"></span>';

  // Defer computation to let the UI update
  setTimeout(function() { _findOptimalIlvlWork(!!lld); btn.disabled = false; btn.textContent = savedText; }, 0);
}

function _findOptimalIlvlWork(lld) {
  const items = getCategoryItems();
  const item = items[state.baseIndex];

  const validPre = state._validPrefixes || [];
  const validSuf = state._validSuffixes || [];

  const LLD_MAX = 30;

  if (state.affixMode === 'fuzzy') {
    // Fuzzy mode: use computeFuzzyOdds at each ilvl to find the best
    const pool = state._fuzzyPool || [];
    let selected = [];
    for (let fsi = 0; fsi < state.fuzzySections.length; fsi++) {
      const secAff = state.fuzzySections[fsi].affixes.filter(i => i >= 0).map(i => pool[i]).filter(Boolean);
      selected = selected.concat(secAff);
    }
    if (selected.length === 0) return;

    let bestIlvl = state.ilvl;
    let bestScore = -1;
    const scores = {};

    const savedIlvl = state.ilvl;
    for (let testIlvl = 1; testIlvl <= 99; testIlvl++) {
      state.ilvl = testIlvl;
      const result = computeFuzzyOdds();
      if (!result) continue;

      let score;
      if (lld && result.lldValidCombinations > 0) {
        score = result.totalCombinations > 0 ? result.lldValidCombinations / result.totalCombinations : 0;
      } else if (!lld && result.percentage > 0) {
        score = result.percentage;
      } else {
        continue;
      }

      scores[testIlvl] = score;
      if (score > bestScore) {
        bestScore = score;
        bestIlvl = testIlvl;
      }
    }

    // Find the range of ilvls with the same best score
    const eps = 1e-12;
    let rangeMin = bestIlvl, rangeMax = bestIlvl;
    for (let il = 1; il <= 99; il++) {
      if (scores[il] !== undefined && Math.abs(scores[il] - bestScore) < eps) {
        if (il < rangeMin) rangeMin = il;
        if (il > rangeMax) rangeMax = il;
      }
    }

    state.ilvl = bestIlvl;
    document.getElementById('ilvl-input').value = bestIlvl;
    updateAlvlDisplay();
    displayIlvlRange(rangeMin, rangeMax);
    buildFuzzySections();
    renderPreview();
    return;
  }

  // Exact mode
  const selPre = state.selectedPrefixes.filter(i => i >= 0).map(i => validPre[i]).filter(Boolean);
  const selSuf = state.selectedSuffixes.filter(i => i >= 0).map(i => validSuf[i]).filter(Boolean);
  if (selPre.length === 0 && selSuf.length === 0) return;

  let bestIlvl = state.ilvl;
  let bestScore = -1;
  const scores = {};

  for (let testIlvl = 1; testIlvl <= 99; testIlvl++) {
    const alvl = calcAlvl(testIlvl, item);

    const allSelected = [...selPre, ...selSuf];
    const allEligible = allSelected.every(a => affixEligibleAtAlvl(a, alvl));
    if (!allEligible) continue;

    const eligPre = filterByAlvl(validPre, alvl);
    const eligSuf = filterByAlvl(validSuf, alvl);

    const preTotalFreq = eligPre.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
    const sufTotalFreq = eligSuf.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);

    const preProbs = selPre.map(a => {
      const f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
      return preTotalFreq > 0 ? f / preTotalFreq : 0;
    });
    const sufProbs = selSuf.map(a => {
      const f = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
      return sufTotalFreq > 0 ? f / sufTotalFreq : 0;
    });

    const slotDist = getSlotDistribution(state.quality, state.category, testIlvl);
    let prob = computeCombinedProb(slotDist, preProbs, sufProbs);
    if (prob <= 0) continue;

    if (lld) {
      const lldPreFreq = eligPre.filter(a => (parseInt(a.levelreq) || 0) <= LLD_MAX).reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
      const lldSufFreq = eligSuf.filter(a => (parseInt(a.levelreq) || 0) <= LLD_MAX).reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
      const pPreLLD = preTotalFreq > 0 ? lldPreFreq / preTotalFreq : 1;
      const pSufLLD = sufTotalFreq > 0 ? lldSufFreq / sufTotalFreq : 1;

      let pLLD = 0;
      for (const config of slotDist) {
        const remPre = Math.max(0, config.pre - selPre.length);
        const remSuf = Math.max(0, config.suf - selSuf.length);
        pLLD += config.prob * Math.pow(pPreLLD, remPre) * Math.pow(pSufLLD, remSuf);
      }
      prob *= pLLD;
    }

    scores[testIlvl] = prob;
    if (prob > bestScore) {
      bestScore = prob;
      bestIlvl = testIlvl;
    }
  }

  // Find the range of ilvls with the same best score
  const eps = 1e-12;
  let rangeMin = bestIlvl, rangeMax = bestIlvl;
  for (let il = 1; il <= 99; il++) {
    if (scores[il] !== undefined && Math.abs(scores[il] - bestScore) < eps) {
      if (il < rangeMin) rangeMin = il;
      if (il > rangeMax) rangeMax = il;
    }
  }

  state.ilvl = bestIlvl;
  document.getElementById('ilvl-input').value = bestIlvl;
  updateAlvlDisplay();
  displayIlvlRange(rangeMin, rangeMax);
  renderPreview();
}

function displayIlvlRange(rangeMin, rangeMax) {

  if (!el) return;
  if (rangeMin === rangeMax) {
    el.innerHTML = 'Best ilvl: <span class="range-value">' + rangeMin + '</span> (only this ilvl has the best odds)';
  } else {
    el.innerHTML = 'Best odds at ilvl <span class="range-value">' + rangeMin + ' \u2013 ' + rangeMax + '</span>';
  }
}

  syncLegacyFuzzyState();
  renderPreview();
}

function buildFuzzyPool() {
  var items = getCategoryItems();
  var item = items[state.baseIndex];
  var validPrefixes = getValidAffixes(prefixes, item, state.quality);
  var validSuffixes = getValidAffixes(suffixes, item, state.quality);
  state._validPrefixes = validPrefixes;
  state._validSuffixes = validSuffixes;
  state._fuzzyPool = validPrefixes.map(function(a) {
    var copy = {}; for (var k in a) copy[k] = a[k]; copy._poolType = "prefix"; return copy;
  }).concat(validSuffixes.map(function(a) {
    var copy = {}; for (var k in a) copy[k] = a[k]; copy._poolType = "suffix"; return copy;
  }));
}

function buildFuzzySections() {
  buildFuzzyPool();
  if (state.fuzzySections.length === 0) state.fuzzySections.push({ affixes: [], min: 1 });
  var container = document.getElementById("fuzzy-sections-container");
  container.innerHTML = "";
  for (var si = 0; si < state.fuzzySections.length; si++) container.appendChild(createFuzzySectionElement(si));
  syncLegacyFuzzyState();
  document.getElementById("fuzzy-affix-area").style.display = "block";
}

function syncLegacyFuzzyState() {
  if (state.fuzzySections.length > 0) {
    state.fuzzyAffixes = state.fuzzySections[0].affixes.slice();
    state.fuzzyMin = state.fuzzySections[0].min;
  }
}

function createFuzzySectionElement(sectionIndex) {
  var section = state.fuzzySections[sectionIndex];
  var div = document.createElement("div");
  div.className = "fuzzy-section";
  div.id = "fuzzy-section-" + sectionIndex;
  var header = document.createElement("div");
  header.className = "fuzzy-section-header";
  var title = document.createElement("h4");
  title.textContent = "Section " + (sectionIndex + 1);
  header.appendChild(title);

// --- Fuzzy combinatorial odds calculation ---
function computeFuzzyOdds() {
  if (state.baseIndex < 0 || !state.quality) return null;
  var items = getCategoryItems(); var item = items[state.baseIndex]; var pool = state._fuzzyPool || [];
  var allSelectedAffixes = []; var sectionInfos = [];

  var validPrefixes = state._validPrefixes || []; var validSuffixes = state._validSuffixes || [];
  var eligPre = filterByAlvl(validPrefixes, alvl); var eligSuf = filterByAlvl(validSuffixes, alvl);
  var slotDist = getSlotDistribution(state.quality, state.category, state.ilvl);
  if (sectionInfos.length === 1) {
    var selPreSet = new Set(); var selSufSet = new Set();
    var selectedAffixes = sectionInfos[0].affixes; var minMatch = sectionInfos[0].min;
    for (var si2 = 0; si2 < selectedAffixes.length; si2++) {
      var a = selectedAffixes[si2];
      if (a._poolType === "prefix") { for (var pi = 0; pi < eligPre.length; pi++) { if (eligPre[pi].Name === a.Name && eligPre[pi].group === a.group && eligPre[pi].level === a.level) { selPreSet.add(pi); break; } } }
      else { for (var xi = 0; xi < eligSuf.length; xi++) { if (eligSuf[xi].Name === a.Name && eligSuf[xi].group === a.group && eligSuf[xi].level === a.level) { selSufSet.add(xi); break; } } }
    }
    var allEligible = selectedAffixes.every(function(a) { return affixEligibleAtAlvl(a, alvl); });
    var baseLevelReq = parseInt(item.levelreq) || 0; var baseLLD = baseLevelReq <= 30;
    var result = computeFuzzyOddsWeighted(slotDist, eligPre, eligSuf, selPreSet, selSufSet, minMatch, alvl, baseLLD, selectedAffixes);
    result.sectionCount = 1; result.sectionInfos = sectionInfos; result.selectedCount = selectedAffixes.length;

  }
  var sectionSets = [];
  for (var ms = 0; ms < sectionInfos.length; ms++) {
    var msPre = new Set(); var msSuf = new Set();
    for (var msa = 0; msa < sectionInfos[ms].affixes.length; msa++) {
      var msAffix = sectionInfos[ms].affixes[msa];
      if (msAffix._poolType === "prefix") { for (var mpi = 0; mpi < eligPre.length; mpi++) { if (eligPre[mpi].Name === msAffix.Name && eligPre[mpi].group === msAffix.group && eligPre[mpi].level === msAffix.level) { msPre.add(mpi); break; } } }
      else { for (var mxi = 0; mxi < eligSuf.length; mxi++) { if (eligSuf[mxi].Name === msAffix.Name && eligSuf[mxi].group === msAffix.group && eligSuf[mxi].level === msAffix.level) { msSuf.add(mxi); break; } } }
    }
    sectionSets.push({ preSet: msPre, sufSet: msSuf, min: sectionInfos[ms].min });

  var result2 = computeMultiSectionFuzzyOdds(slotDist, eligPre, eligSuf, sectionSets, alvl, baseLLD2, allSelectedAffixes);
  result2.sectionCount = sectionInfos.length; result2.sectionInfos = sectionInfos;
  result2.allEligible = allEligible2; result2.selectedCount = allSelectedAffixes.length;

function computeMultiSectionFuzzyOdds(slotDist, eligPre, eligSuf, sectionSets, alvl, baseLLD, allSelectedAffixes) {
  var CAP = 500000;
  function getGroupUniqueSubsets(pool, size) {
    if (size <= 0) return [[]]; var results = [];
    function recurse(start, current, usedGroups) {
      if (current.length === size) { results.push(current.slice()); return; }
      if (start >= pool.length || results.length > CAP) return;
      if (pool.length - start < size - current.length) return;
      for (var i = start; i < pool.length; i++) {
        var grp = pool[i].group; if (grp && usedGroups.has(grp)) continue;
        current.push(i); if (grp) usedGroups.add(grp);
        recurse(i + 1, current, usedGroups);
        current.pop(); if (grp) usedGroups.delete(grp);
        if (results.length > CAP) return;
      }
    }
    recurse(0, [], new Set()); return results;
  }
  function comboMultiInfo(combo, pool, sectionSelSets) {
    var sectionHits = new Array(sectionSelSets.length);
    for (var s = 0; s < sectionSelSets.length; s++) sectionHits[s] = 0;
    var lld = true;
    for (var i = 0; i < combo.length; i++) {
      for (var s2 = 0; s2 < sectionSelSets.length; s2++) { if (sectionSelSets[s2].has(combo[i])) sectionHits[s2]++; }
      if (lld && (parseInt(pool[combo[i]].levelreq) || 0) > 30) lld = false;
    }
    return { sectionHits: sectionHits, lld: lld };
  }
  var preSizes = new Set(), sufSizes = new Set();
  for (var di = 0; di < slotDist.length; di++) { preSizes.add(slotDist[di].pre); sufSizes.add(slotDist[di].suf); }
  var capped = false;
  var preSectionSets = sectionSets.map(function(s) { return s.preSet; });
  var sufSectionSets = sectionSets.map(function(s) { return s.sufSet; });
  var preDists = {};
  preSizes.forEach(function(size) {
    var combos = getGroupUniqueSubsets(eligPre, size); if (combos.length > CAP) capped = true;
    var dist = {};
    for (var i = 0; i < combos.length; i++) {
      var info = comboMultiInfo(combos[i], eligPre, preSectionSets);
      var key = info.sectionHits.join(",") + ":" + (info.lld && baseLLD ? "1" : "0");
      dist[key] = (dist[key] || 0) + 1;
    }
    preDists[size] = { dist: dist, count: combos.length };
  });
  var sufDists = {};
  sufSizes.forEach(function(size) {
    var combos = getGroupUniqueSubsets(eligSuf, size); if (combos.length > CAP) capped = true;
    var dist = {};
    for (var i = 0; i < combos.length; i++) {
      var info = comboMultiInfo(combos[i], eligSuf, sufSectionSets);
      var key = info.sectionHits.join(",") + ":" + (info.lld ? "1" : "0");
      dist[key] = (dist[key] || 0) + 1;
    }
    sufDists[size] = { dist: dist, count: combos.length };
  });
  var totalPossible = 0, totalValid = 0, totalValidLLD = 0, totalLLD = 0;
  var numSections = sectionSets.length;
  for (var ci = 0; ci < slotDist.length; ci++) {
    var config = slotDist[ci]; var pd = preDists[config.pre]; var sd = sufDists[config.suf];
    var configTotal = pd.count * sd.count; var configValid = 0, configValidLLD = 0, configLLD = 0;
    for (var pk in pd.dist) {
      var pp = pk.split(":"); var preHitsArr = pp[0].split(",").map(Number); var preLLD = pp[1] === "1";
      for (var sk in sd.dist) {
        var sp = sk.split(":"); var sufHitsArr = sp[0].split(",").map(Number); var sufLLD = sp[1] === "1";
        var product = pd.dist[pk] * sd.dist[sk];
        if (preLLD && sufLLD) configLLD += product;
        var allMet = true;
        for (var sec = 0; sec < numSections; sec++) { if (preHitsArr[sec] + sufHitsArr[sec] < sectionSets[sec].min) { allMet = false; break; } }
        if (allMet) { configValid += product; if (preLLD && sufLLD) configValidLLD += product; }
      }
    }
    totalPossible += config.prob * configTotal; totalValid += config.prob * configValid;
    totalValidLLD += config.prob * configValidLLD; totalLLD += config.prob * configLLD;
  }
  return { validCombinations: totalValid, totalCombinations: totalPossible,
    percentage: totalPossible > 0 ? (totalValid / totalPossible * 100) : 0,
    lldValidCombinations: totalValidLLD, lldTotalCombinations: totalLLD,
    lldPercentage: totalValid > 0 ? (totalValidLLD / totalValid * 100) : 0,
    baseLLD: baseLLD, capped: capped };
}

function computeFuzzyOddsWeighted(slotDist, eligPre, eligSuf, selPreSet, selSufSet, minMatch, alvl, baseLLD, selectedAffixes) {
  var CAP = 500000;

  function getGroupUniqueSubsets(pool, size) {
    if (size <= 0) return [[]];
    var results = [];
    function recurse(start, current, usedGroups, usedNames) {
      if (current.length === size) {
        results.push(current.slice());
        return;
      }
      if (start >= pool.length) return;
      if (results.length > CAP) return;
      var remaining = pool.length - start;
      var needed = size - current.length;
      if (remaining < needed) return;
      for (var i = start; i < pool.length; i++) {
        var grp = pool[i].group;
        var nm = pool[i].Name;
        if (grp && usedGroups.has(grp)) continue;
        if (nm && usedNames.has(nm)) continue;
        current.push(i);
        if (grp) usedGroups.add(grp);
        if (nm) usedNames.add(nm);
        recurse(i + 1, current, usedGroups, usedNames);
        current.pop();
        if (grp) usedGroups.delete(grp);
        if (nm) usedNames.delete(nm);
        if (results.length > CAP) return;
      }
    }
    recurse(0, [], new Set(), new Set());
    return results;
  }

  function comboInfo(combo, pool, selSet) {
    var hits = 0, lld = true;
    for (var i = 0; i < combo.length; i++) {
      if (selSet.has(combo[i])) hits++;
      if (lld && (parseInt(pool[combo[i]].levelreq) || 0) > 30) lld = false;
    }
    return { hits: hits, lld: lld };
  }

  // Collect unique prefix and suffix sizes needed
  var preSizes = new Set(), sufSizes = new Set();
  for (var di = 0; di < slotDist.length; di++) {
    preSizes.add(slotDist[di].pre);
    sufSizes.add(slotDist[di].suf);
  }

  // Precompute subsets and distributions for each size
  var preSubsets = {}, sufSubsets = {};
  var preDists = {}, sufDists = {};
  var capped = false;

  preSizes.forEach(function(size) {
    var combos = getGroupUniqueSubsets(eligPre, size);
    if (combos.length > CAP) capped = true;
    preSubsets[size] = combos;
    // Build distribution: keyed by (hits, lld)
    var dist = {};
    for (var i = 0; i < combos.length; i++) {
      var info = comboInfo(combos[i], eligPre, selPreSet);
      var key = info.hits + ':' + (info.lld && baseLLD ? '1' : '0');
      dist[key] = (dist[key] || 0) + 1;
    }
    preDists[size] = { dist: dist, count: combos.length };
  });

  sufSizes.forEach(function(size) {
    var combos = getGroupUniqueSubsets(eligSuf, size);
    if (combos.length > CAP) capped = true;
    sufSubsets[size] = combos;
    var dist = {};
    for (var i = 0; i < combos.length; i++) {
      var info = comboInfo(combos[i], eligSuf, selSufSet);
      var key = info.hits + ':' + (info.lld ? '1' : '0');
      dist[key] = (dist[key] || 0) + 1;
    }
    sufDists[size] = { dist: dist, count: combos.length };
  });

  // Weighted combination across all slot configurations
  var totalPossible = 0, totalValid = 0, totalValidLLD = 0, totalLLD = 0;

  for (var ci = 0; ci < slotDist.length; ci++) {
    var config = slotDist[ci];
    var pd = preDists[config.pre];
    var sd = sufDists[config.suf];
    var configTotal = pd.count * sd.count;
    var configValid = 0, configValidLLD = 0, configLLD = 0;

    for (var pk in pd.dist) {
      var pp = pk.split(':');
      var preHits = parseInt(pp[0]);
      var preLLD = pp[1] === '1';
      var needSuf = Math.max(0, minMatch - preHits);

      for (var sk in sd.dist) {
        var sp = sk.split(':');
        var sufHits = parseInt(sp[0]);
        var sufLLD = sp[1] === '1';
        var product = pd.dist[pk] * sd.dist[sk];

        if (preLLD && sufLLD) configLLD += product;
        if (preHits + sufHits >= minMatch) {
          configValid += product;
          if (preLLD && sufLLD) configValidLLD += product;
        }
      }
    }

    totalPossible += config.prob * configTotal;
    totalValid += config.prob * configValid;
    totalValidLLD += config.prob * configValidLLD;
    totalLLD += config.prob * configLLD;
  }

  return {
    validCombinations: totalValid,
    totalCombinations: totalPossible,
    percentage: totalPossible > 0 ? (totalValid / totalPossible * 100) : 0,
    lldValidCombinations: totalValidLLD,
    lldTotalCombinations: totalLLD,
    lldPercentage: totalValid > 0 ? (totalValidLLD / totalValid * 100) : 0,
    baseLLD: baseLLD,
    minMatch: minMatch,
    selectedCount: selectedAffixes.length,
    allEligible: selectedAffixes.every(function(a) { return affixEligibleAtAlvl(a, alvl); }),
    capped: capped
  };
}

function buildAffixSlots() {
  const isJewelRare = state.quality === 'rare' && state.category === 'jewel';
  const maxPre = (state.quality === 'rare' || state.quality === 'crafted') ? 3 : 1;
  const maxSuf = (state.quality === 'rare' || state.quality === 'crafted') ? 3 : 1;
  const area = document.getElementById('affix-area');
  area.style.display = 'block';

  const affixDesc = getAffixCountDesc(state.quality, state.category, state.ilvl);
  if (isJewelRare) {
    document.getElementById('prefix-header').textContent = 'Prefixes (' + affixDesc + ')';
    document.getElementById('suffix-header').textContent = 'Suffixes (' + affixDesc + ')';
  } else {
    document.getElementById('prefix-header').textContent = 'Prefixes (up to ' + maxPre + ', ' + affixDesc + ')';
    document.getElementById('suffix-header').textContent = 'Suffixes (up to ' + maxSuf + ', ' + affixDesc + ')';
  }

  const items = getCategoryItems();
  const item = items[state.baseIndex];

  const validPrefixes = getValidAffixes(prefixes, item, state.quality);
  const validSuffixes = getValidAffixes(suffixes, item, state.quality);
  state._validPrefixes = validPrefixes;
  state._validSuffixes = validSuffixes;

  // Build prefix slots
  const preContainer = document.getElementById('prefix-slots');
  preContainer.innerHTML = '';
  for (let i = 0; i < maxPre; i++) {
    state.selectedPrefixes[i] = -1;
    preContainer.appendChild(createAffixSelect('prefix', i, validPrefixes));
  }

  // Build suffix slots
  const sufContainer = document.getElementById('suffix-slots');
  sufContainer.innerHTML = '';
  for (let i = 0; i < maxSuf; i++) {
    state.selectedSuffixes[i] = -1;
    sufContainer.appendChild(createAffixSelect('suffix', i, validSuffixes));
  }
}

// --- Get groups and names used by other slots of the same type, excluding the given slot ---
function getUsedGroups(type, excludeSlot) {
  const arr = type === 'prefix' ? state.selectedPrefixes : state.selectedSuffixes;
  const pool = type === 'prefix' ? state._validPrefixes : state._validSuffixes;
  const groups = new Set();
  const names = new Set();
  for (let i = 0; i < arr.length; i++) {
    if (i === excludeSlot || arr[i] < 0) continue;
    const affix = pool[arr[i]];
    if (affix && affix.group) groups.add(affix.group);
    if (affix && affix.Name) names.add(affix.Name);
  }
  return { groups, names };
}

// --- Refresh all sibling slot options (to update group filtering) ---
function refreshAffixSlots(type) {
  const maxSlots = type === 'prefix' ? state.selectedPrefixes.length : state.selectedSuffixes.length;
  for (let i = 0; i < maxSlots; i++) {
    const sel = document.getElementById(type + '-' + i);
    if (sel && sel._populate) sel._populate();
  }
}

// --- Rare jewel: 4 total affixes max (1P + 1S guaranteed, 2 wild) ---
function getJewelAffixCount() {
  const preCount = state.selectedPrefixes.filter(i => i >= 0).length;
  const sufCount = state.selectedSuffixes.filter(i => i >= 0).length;
  return preCount + sufCount;
}

function enforceJewelCap() {
  const isJewelRare = state.quality === 'rare' && state.category === 'jewel';
  const atCap = isJewelRare && getJewelAffixCount() >= 4;

  // Disable/enable empty slots across both prefix and suffix
  for (const type of ['prefix', 'suffix']) {
    const arr = type === 'prefix' ? state.selectedPrefixes : state.selectedSuffixes;
    for (let i = 0; i < arr.length; i++) {
      const sel = document.getElementById(type + '-' + i);
      if (!sel) continue;
      const isEmpty = arr[i] < 0;
      sel.disabled = atCap && isEmpty;
      // Also disable the filter input
      const filterInput = sel.parentElement.querySelector('input');
      if (filterInput) filterInput.disabled = atCap && isEmpty;
    }
  }
}

function createAffixSelect(type, slotIndex, affixPool) {
  const div = document.createElement('div');
  div.className = 'affix-slot';

  const filter = document.createElement('input');
  filter.type = 'text';
  filter.className = 'affix-list-filter';
  filter.placeholder = 'Filter ' + type + '...';

  const sel = document.createElement('select');
  sel.id = type + '-' + slotIndex;

  function populateOptions() {
    const currentVal = sel.value;
    sel.innerHTML = '<option value="-1">-- None --</option>';
    const ft = (filter.value || '').toLowerCase();
    const { groups: usedGroups, names: usedNames } = getUsedGroups(type, slotIndex);

    affixPool.forEach((a, idx) => {
      // Skip if this affix's group or name is already used by another slot
      if (a.group && usedGroups.has(a.group)) return;
      if (a.Name && usedNames.has(a.Name)) return;
      // Build a description of what the affix does
      const desc = affixDescription(a);
      const lvlReq = parseInt(a.levelreq) || 0;
      const label = a.Name + (desc ? ' — ' + desc : '') + ' (lvl ' + a.level + (lvlReq > 0 ? ', req ' + lvlReq : '') + ')';
      if (ft && !label.toLowerCase().includes(ft)) return;
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = label;
      sel.appendChild(opt);
    });

    // Restore selection if still valid
    if (sel.querySelector('option[value="' + currentVal + '"]')) {
      sel.value = currentVal;
    }
  }

  // Store populate function on the element so siblings can trigger it
  sel._populate = populateOptions;

  populateOptions();

  filter.addEventListener('input', populateOptions);

  sel.addEventListener('change', function() {
    const arr = type === 'prefix' ? state.selectedPrefixes : state.selectedSuffixes;
    arr[slotIndex] = parseInt(this.value);
    refreshAffixSlots('prefix');
    refreshAffixSlots('suffix');
    enforceJewelCap();
    renderPreview();
  });

  div.appendChild(filter);
  div.appendChild(sel);
  return div;
}

function affixDescription(affix) {
  const parts = [];
  for (let i = 1; i <= 3; i++) {
    const code = affix['mod' + i + 'code'];
    if (!code) continue;
    const min = affix['mod' + i + 'min'];
    const max = affix['mod' + i + 'max'];
    const param = affix['mod' + i + 'param'];
    parts.push(formatMod(code, param, min, max));
  }
  return parts.join(', ');
}

// --- Preview rendering ---
function renderPreview() {
  const preview = document.getElementById('preview');
  const items = getCategoryItems();

  if (state.baseIndex < 0 || !state.category) {
    preview.innerHTML = '<div class="no-item">Select an item base and quality to begin</div>';
    const lb1 = document.getElementById('btn-optimal-lld'); if (lb1) lb1.style.display = 'none';
    stateToHash();
    return;
  }

  const item = items[state.baseIndex];
  if (!state.quality) {
    preview.innerHTML = '<div class="no-item">Select Magic or Rare quality</div>';
    const lb2 = document.getElementById('btn-optimal-lld'); if (lb2) lb2.style.display = 'none';
    stateToHash();
    return;
  }

  // Show/hide Best ilvl LLD button based on whether all selected affixes + base are LLD-eligible
  const lldBtn = document.getElementById('btn-optimal-lld');
  if (lldBtn) {
    const LLD_CHECK = 30;
    const baseReq = parseInt(item.levelreq) || 0;
    let allLLD = baseReq <= LLD_CHECK;
    if (allLLD) {
      if (state.affixMode === 'fuzzy') {
        const pool = state._fuzzyPool || [];
        let allFuzzyAffixes = [];
        for (let fsi = 0; fsi < state.fuzzySections.length; fsi++) {
          const secAff = state.fuzzySections[fsi].affixes.filter(i => i >= 0).map(i => pool[i]).filter(Boolean);
          allFuzzyAffixes = allFuzzyAffixes.concat(secAff);
        }
        allLLD = allFuzzyAffixes.length > 0 && allFuzzyAffixes.every(a => (parseInt(a.levelreq) || 0) <= LLD_CHECK);
      } else {
        const vp = state._validPrefixes || [];
        const vs = state._validSuffixes || [];
        const sp = state.selectedPrefixes.filter(i => i >= 0).map(i => vp[i]).filter(Boolean);
        const ss = state.selectedSuffixes.filter(i => i >= 0).map(i => vs[i]).filter(Boolean);
        const all = [...sp, ...ss];
        allLLD = all.length > 0 && all.every(a => (parseInt(a.levelreq) || 0) <= LLD_CHECK);
      }
    }
    lldBtn.style.display = allLLD ? '' : 'none';
  }

  // Fuzzy mode: show combinatorial odds instead of normal item preview
  if (state.affixMode === 'fuzzy') {
    let html = '';
    html += '<div class="item-name ' + (state.quality === 'crafted' ? 'crafted' : (state.quality === 'magic' ? 'magic' : 'rare')) + '">' + esc(item.name) + '</div>';
    html += '<div style="color:#888; font-size:0.85rem; font-style:italic; margin: 10px 0;">Fuzzy Affixes mode - showing combination odds</div>';

    // Affix count probabilities for fuzzy mode
    var fuzzySlotDist = getSlotDistribution(state.quality, state.category, state.ilvl);
    var fuzzyCountProbs = {};
    for (var fdi = 0; fdi < fuzzySlotDist.length; fdi++) {
      var ft = fuzzySlotDist[fdi].pre + fuzzySlotDist[fdi].suf;
      fuzzyCountProbs[ft] = (fuzzyCountProbs[ft] || 0) + fuzzySlotDist[fdi].prob;
    }
    var fuzzyCountKeys = Object.keys(fuzzyCountProbs).map(Number).sort(function(a, b) { return a - b; });
    var fuzzyAffixDesc = getAffixCountDesc(state.quality, state.category, state.ilvl);
    html += '<div style="color:#a0a0b0; font-size:0.8rem; margin-bottom:8px;">' + fuzzyAffixDesc;
    if (fuzzyCountKeys.length > 1) {
      html += ' &mdash; ' + fuzzyCountKeys.map(function(n) { return n + ': ' + (fuzzyCountProbs[n] * 100).toFixed(1) + '%'; }).join(' | ');
    }
    html += '</div>';

    var fuzzyResult = computeFuzzyOdds();
    if (fuzzyResult) {
      html += '<div class="fuzzy-results">';
      html += '<div class="fuzzy-header">Fuzzy Affix Combinations</div>';
      html += '<div class="fuzzy-stat">Selected affixes: <span class="val">' + fuzzyResult.selectedCount + '</span></div>';
      if (fuzzyResult.sectionCount > 1) {
        html += '<div class="fuzzy-stat">Sections: <span class="val">' + fuzzyResult.sectionCount + '</span></div>';
        for (var rsi = 0; rsi < fuzzyResult.sectionInfos.length; rsi++) {
          var rSec = fuzzyResult.sectionInfos[rsi];
          html += '<div class="fuzzy-stat" style="font-size:0.8rem;">&nbsp;&nbsp;Section ' + (rsi + 1) + ': ' + rSec.affixes.length + ' affixes, min <span class="val">' + rSec.min + '</span></div>';
        }
      } else {
        html += '<div class="fuzzy-stat">Minimum to match: <span class="val">' + fuzzyResult.minMatch + '</span></div>';
      }
      if (!fuzzyResult.allEligible) {
        html += '<div class="fuzzy-stat" style="color:#cc4444;">Warning: some selected affixes are not eligible at current alvl</div>';
      }
      html += '<div class="separator"></div>';
      html += '<div class="fuzzy-stat">Valid combinations (>= ' + fuzzyResult.minMatch + ' match): <span class="val">' + shortNum(Math.round(fuzzyResult.validCombinations)) + '</span></div>';
      html += '<div class="fuzzy-stat">Total possible combinations: <span class="val">' + shortNum(Math.round(fuzzyResult.totalCombinations)) + '</span></div>';
      if (fuzzyResult.capped) {
        html += '<div class="fuzzy-stat" style="color:#cc8844;">Note: large pool - enumeration capped, results are approximate</div>';
      }
      var pct = fuzzyResult.percentage;
      html += '<div class="fuzzy-pct">' + (pct > 0 ? pct.toFixed(4) + '%' : '0%') + '</div>';
      if (pct > 0) {
        var ratio = Math.round(100 / pct);
        html += '<div class="fuzzy-stat">Approximately <span class="val">' + oddsText(ratio) + '</span></div>';
        var fuzzyRangeText = shortNum(ratio);
        var fuzzyLo = state.ilvl, fuzzyHi = state.ilvl;
        var savedFuzzyIlvl = state.ilvl;
        for (var fi = state.ilvl - 1; fi >= 1; fi--) {
          state.ilvl = fi;
          var fr = computeFuzzyOdds();
          if (!fr || fr.percentage <= 0) break;
          if (shortNum(Math.round(100 / fr.percentage)) !== fuzzyRangeText) break;
          fuzzyLo = fi;
        }
        for (var fi2 = savedFuzzyIlvl + 1; fi2 <= 99; fi2++) {
          state.ilvl = fi2;
          var fr2 = computeFuzzyOdds();
          if (!fr2 || fr2.percentage <= 0) break;
          if (shortNum(Math.round(100 / fr2.percentage)) !== fuzzyRangeText) break;
          fuzzyHi = fi2;
        }
        state.ilvl = savedFuzzyIlvl;
        if (fuzzyLo !== fuzzyHi) {
          html += '<div class="fuzzy-stat" style="color:#a0a0b0; font-size:0.75rem;">Same odds for ilvl ' + fuzzyLo + '-' + fuzzyHi + '</div>';
        }
      }
      html += '</div>';

      // LLD section for fuzzy mode
      if (fuzzyResult.baseLLD) {
        html += '<div class="lld-section">';
        html += '<div class="lld-header">LLD Eligibility (Req Level &le; 30)</div>';
        if (fuzzyResult.lldValidCombinations > 0) {
          html += '<div class="lld-odds">LLD-eligible matching combinations: <span class="lld-value">' + shortNum(Math.round(fuzzyResult.lldValidCombinations)) + '</span> of ' + shortNum(Math.round(fuzzyResult.validCombinations)) + '</div>';
          html += '<div class="lld-odds">Chance a matching combo is also LLD: <span class="lld-value">' + fuzzyResult.lldPercentage.toFixed(2) + '%</span></div>';
          var overallLLD = fuzzyResult.totalCombinations > 0 ? (fuzzyResult.lldValidCombinations / fuzzyResult.totalCombinations * 100) : 0;
          html += '<div class="lld-odds">Overall LLD + match chance: <span class="lld-value">' + overallLLD.toFixed(4) + '%</span></div>';
          if (overallLLD > 0) {
            var lldRatio = Math.round(100 / overallLLD);
            html += '<div class="lld-odds">Approximately <span class="lld-value">' + oddsText(lldRatio) + '</span></div>';
            var fuzzyLldText = shortNum(lldRatio);
            var fuzzyLldLo = state.ilvl, fuzzyLldHi = state.ilvl;
            var savedLldIlvl = state.ilvl;
            for (var li = state.ilvl - 1; li >= 1; li--) {
              state.ilvl = li;
              var lr = computeFuzzyOdds();
              if (!lr || lr.totalCombinations <= 0 || lr.lldValidCombinations <= 0) break;
              var lldPct = lr.lldValidCombinations / lr.totalCombinations * 100;
              if (shortNum(Math.round(100 / lldPct)) !== fuzzyLldText) break;
              fuzzyLldLo = li;
            }
            for (var li2 = savedLldIlvl + 1; li2 <= 99; li2++) {
              state.ilvl = li2;
              var lr2 = computeFuzzyOdds();
              if (!lr2 || lr2.totalCombinations <= 0 || lr2.lldValidCombinations <= 0) break;
              var lldPct2 = lr2.lldValidCombinations / lr2.totalCombinations * 100;
              if (shortNum(Math.round(100 / lldPct2)) !== fuzzyLldText) break;
              fuzzyLldHi = li2;
            }
            state.ilvl = savedLldIlvl;
            if (fuzzyLldLo !== fuzzyLldHi) {
              html += '<div class="lld-odds" style="color:#a0a0b0; font-size:0.75rem;">Same odds for ilvl ' + fuzzyLldLo + '-' + fuzzyLldHi + '</div>';
            }
          }
        } else {
          html += '<div class="lld-ineligible">No matching combinations are LLD-eligible</div>';
        }
        html += '</div>';
      }

      // ilvl breakdown button (computed on demand)
      html += '<div style="margin-top:10px; text-align:center;">';
      html += '<button class="ilvl-breakdown-btn" onclick="toggleIlvlBreakdown(\'ilvl-bd-fuzzy\', \'fuzzy\')">Show ilvl Breakdown</button>';
      html += '</div>';
      html += '<div id="ilvl-bd-fuzzy" class="ilvl-breakdown" style="display:none;"></div>';
    } else {
      html += '<div style="color:#555; margin-top: 20px;">Select at least one affix to see combination odds</div>';
    }

    preview.innerHTML = html;
    stateToHash();
    return;
  }

  const validPrefixes = getValidAffixes(prefixes, item, state.quality);
  const validSuffixes = getValidAffixes(suffixes, item, state.quality);

  // Gather selected affixes
  const selPre = state.selectedPrefixes
    .filter(i => i >= 0)
    .map(i => validPrefixes[i])
    .filter(Boolean);
  const selSuf = state.selectedSuffixes
    .filter(i => i >= 0)
    .map(i => validSuffixes[i])
    .filter(Boolean);

  // Collect all affix mods for stat calculation
  const allAffixes = [...selPre, ...selSuf];
  let totalED = 0, flatMinDmg = 0, flatMaxDmg = 0;
  let totalAC = 0, flatAC = 0;
  for (const a of allAffixes) {
    for (let i = 1; i <= 3; i++) {
      const code = a['mod' + i + 'code'];
      const min = parseInt(a['mod' + i + 'min']) || 0;
      const max = parseInt(a['mod' + i + 'max']) || 0;
      if (code === 'dmg%') totalED += max;
      if (code === 'dmg-min') flatMinDmg += max;
      if (code === 'dmg-max') flatMaxDmg += max;
      if (code === 'ac%') totalAC += max;
      if (code === 'ac') flatAC += max;
    }
  }

  const ethMult = state.ethereal ? 1.25 : 1;

  // Build item name
  const nameClass = state.quality === 'crafted' ? 'crafted' : (state.quality === 'magic' ? 'magic' : 'rare');
  let html = '';

  if (state.quality === 'rare' || state.quality === 'crafted') {
    html += '<div class="item-name ' + nameClass + '">' + esc(state.rareName) +
      ' <span class="reroll-btn" onclick="rerollRareName()" title="Reroll rare name">&#x21bb;</span></div>';
    html += '<div class="base-name">' + esc(item.name) + '</div>';
  } else {
    let itemName = '';
    if (selPre.length > 0) itemName += selPre[0].Name + ' ';
    itemName += item.name;
    if (selSuf.length > 0) itemName += ' ' + selSuf[0].Name;
    html += '<div class="item-name ' + nameClass + '">' + esc(itemName) + '</div>';
  }

  if (state.ethereal) {
    html += '<div class="ethereal-tag">Ethereal (Cannot Be Repaired)</div>';
  }

  // Base stats with affix calculations
  html += '<div class="base-stats">';
  if (state.category === 'armor') {
    const baseMin = Math.floor((parseInt(item.minac) || 0) * ethMult);
    const baseMax = Math.floor((parseInt(item.maxac) || 0) * ethMult);
    const effMin = Math.floor(baseMin * (1 + totalAC / 100)) + flatAC;
    const effMax = Math.floor(baseMax * (1 + totalAC / 100)) + flatAC;
    html += '<div>Defense: ' + effMin + '-' + effMax + '</div>';
  } else if (state.category === 'weapon') {
    const raw1hMin = parseInt(item.mindam) || 0;
    const raw1hMax = parseInt(item.maxdam) || 0;
    if (raw1hMin > 0 || raw1hMax > 0) {
      const base1hMin = Math.floor(raw1hMin * ethMult);
      const base1hMax = Math.floor(raw1hMax * ethMult);
      const eff1hMin = Math.floor(base1hMin * (1 + totalED / 100)) + flatMinDmg;
      const eff1hMax = Math.floor(base1hMax * (1 + totalED / 100)) + flatMaxDmg;
      html += '<div>One-Hand Damage: ' + eff1hMin + '-' + eff1hMax + '</div>';
    }
    const raw2hMin = parseInt(item['2handmindam']) || 0;
    const raw2hMax = parseInt(item['2handmaxdam']) || 0;
    if (raw2hMin > 0 || raw2hMax > 0) {
      const base2hMin = Math.floor(raw2hMin * ethMult);
      const base2hMax = Math.floor(raw2hMax * ethMult);
      const eff2hMin = Math.floor(base2hMin * (1 + totalED / 100)) + flatMinDmg;
      const eff2hMax = Math.floor(base2hMax * (1 + totalED / 100)) + flatMaxDmg;
      html += '<div>Two-Hand Damage: ' + eff2hMin + '-' + eff2hMax + '</div>';
    }
  }
  if (item.durability && item.nodurability !== '1') {
    html += '<div>Durability: ' + item.durability + '</div>';
  }
  html += '</div>';

  // Affix mods
  const allMods = [];
  for (const a of selPre) {
    for (let i = 1; i <= 3; i++) {
      const code = a['mod' + i + 'code'];
      if (code) allMods.push({ code, param: a['mod' + i + 'param'], min: a['mod' + i + 'min'], max: a['mod' + i + 'max'], type: 'prefix' });
    }
  }
  for (const a of selSuf) {
    for (let i = 1; i <= 3; i++) {
      const code = a['mod' + i + 'code'];
      if (code) allMods.push({ code, param: a['mod' + i + 'param'], min: a['mod' + i + 'min'], max: a['mod' + i + 'max'], type: 'suffix' });
    }
  }

  if (allMods.length > 0) {
    html += '<div class="separator"></div>';
    html += '<div class="affix-stats">';
    for (const m of allMods) {
      const cls = m.type + '-stat';
      let line = formatMod(m.code, m.param, m.min, m.max);
      html += '<div class="' + cls + ' mod-line">' + esc(line) + '</div>';
    }
    html += '</div>';
  }

  // Requirements
  html += '<div class="separator"></div>';
  html += '<div class="req">';
  // Compute required level: max of base item levelreq and all affix levelreqs
  let reqLvl = parseInt(item.levelreq) || 0;
  for (const a of allAffixes) {
    const aReq = parseInt(a.levelreq) || 0;
    if (aReq > reqLvl) reqLvl = aReq;
  }
  if (reqLvl > 0) html += '<div>Required Level: ' + reqLvl + '</div>';
  if (item.reqstr && item.reqstr !== '0') html += '<div>Required Strength: ' + item.reqstr + '</div>';
  if (item.reqdex && item.reqdex !== '0') html += '<div>Required Dexterity: ' + item.reqdex + '</div>';
  html += '</div>';

  // Odds section
  if (selPre.length > 0 || selSuf.length > 0) {
    const alvl = calcAlvl(state.ilvl, item);
    const eligPre = filterByAlvl(validPrefixes, alvl);
    const eligSuf = filterByAlvl(validSuffixes, alvl);
    const preTotalFreq = eligPre.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
    const sufTotalFreq = eligSuf.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);

    html += '<div class="separator"></div>';
    html += '<div class="odds-section">';
    const affixCountDesc = getAffixCountDesc(state.quality, state.category, state.ilvl);
    html += '<h4>Roll Odds (alvl ' + alvl + ', ' + affixCountDesc + ', ' + eligPre.length + ' prefixes / ' + eligSuf.length + ' suffixes in pool)</h4>';

    // Affix count probabilities
    const slotDist = getSlotDistribution(state.quality, state.category, state.ilvl);
    const countProbs = {};
    for (const config of slotDist) {
      const total = config.pre + config.suf;
      countProbs[total] = (countProbs[total] || 0) + config.prob;
    }
    const countKeys = Object.keys(countProbs).map(Number).sort((a, b) => a - b);
    if (countKeys.length > 1 || countKeys[0] !== countKeys[countKeys.length - 1]) {
      html += '<div style="color:#a0a0b0; font-size:0.8rem; margin-bottom:8px;">';
      html += countKeys.map(n => n + ' affixes: ' + (countProbs[n] * 100).toFixed(1) + '%').join(' &nbsp;|&nbsp; ');
      html += '</div>';
    }

    // Individual affix odds (per single roll from alvl-filtered pool)
    const preProbs = [];
    for (const a of selPre) {
      const eligible = affixEligibleAtAlvl(a, alvl);
      const freq = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
      const prob = eligible && preTotalFreq > 0 ? freq / preTotalFreq : 0;
      preProbs.push(prob);
      const ratio = prob > 0 ? Math.round(1 / prob) : 0;
      html += '<div class="odds-row">';
      html += '<span class="odds-label" title="' + esc(a.Name) + '">' + esc(a.Name) + (!eligible ? ' <span style="color:#cc4444;">(needs alvl ' + a.level + (a.maxlevel ? '-' + a.maxlevel : '+') + ')</span>' : '') + '</span>';
      html += '<span class="odds-pct">' + (eligible ? oddsText(ratio) : '<span style="color:#cc4444;">impossible</span>') + '</span>';
      html += '</div>';
    }

    const sufProbs = [];
    for (const a of selSuf) {
      const eligible = affixEligibleAtAlvl(a, alvl);
      const freq = (a.frequency === '' ? 1 : parseInt(a.frequency) || 0);
      const prob = eligible && sufTotalFreq > 0 ? freq / sufTotalFreq : 0;
      sufProbs.push(prob);
      const ratio = prob > 0 ? Math.round(1 / prob) : 0;
      html += '<div class="odds-row">';
      html += '<span class="odds-label" title="' + esc(a.Name) + '">' + esc(a.Name) + (!eligible ? ' <span style="color:#cc4444;">(needs alvl ' + a.level + (a.maxlevel ? '-' + a.maxlevel : '+') + ')</span>' : '') + '</span>';
      html += '<span class="odds-pct">' + (eligible ? oddsText(ratio) : '<span style="color:#cc4444;">impossible</span>') + '</span>';
      html += '</div>';
    }

    // Combined odds using slot distribution model
    let combinedProb = computeCombinedProb(slotDist, preProbs, sufProbs);

    // Ethereal odds
    if (state.ethereal) {
      combinedProb *= (1 / 20);
      html += '<div class="odds-row">';
      html += '<span class="odds-label">Ethereal</span>';
      html += '<span class="odds-pct">1 in 20</span>';
      html += '</div>';
    }

    // Combined odds
    html += '<div class="odds-combined">';
    html += '<div class="label">Combined chance for these affixes</div>';
    const combinedRatio = combinedProb > 0 ? Math.round(1 / combinedProb) : 0;
    html += '<div class="value">' + oddsText(combinedRatio) + '</div>';
    const ilvlRange = combinedProb > 0 ? findIlvlRange(item, validPrefixes, validSuffixes, selPre, selSuf, state.quality, state.category, state.ethereal, state.ilvl) : null;
    if (ilvlRange && (ilvlRange.lo !== ilvlRange.hi)) {
      html += '<div style="color:#a0a0b0; font-size:0.75rem; margin-top:2px;">Same odds for ilvl ' + ilvlRange.lo + '-' + ilvlRange.hi + '</div>';
    }
    html += '</div>';

    // LLD Smart Mode: check if all selected affixes + base item have levelreq <= 30
    const LLD_MAX_LEVEL = 30;
    const baseLevelReq = parseInt(item.levelreq) || 0;
    const allSelectedAffixes = [...selPre, ...selSuf];
    const selectedLevelReqs = allSelectedAffixes.map(a => parseInt(a.levelreq) || 0);
    const allSelectedLLD = selectedLevelReqs.every(r => r <= LLD_MAX_LEVEL) && baseLevelReq <= LLD_MAX_LEVEL;

    if (allSelectedLLD && allSelectedAffixes.length > 0) {
      html += '<div class="lld-section">';
      html += '<div class="lld-header">LLD Eligibility (Req Level &le; ' + LLD_MAX_LEVEL + ')</div>';

      const lldEligPre = eligPre.filter(a => (parseInt(a.levelreq) || 0) <= LLD_MAX_LEVEL);
      const lldEligSuf = eligSuf.filter(a => (parseInt(a.levelreq) || 0) <= LLD_MAX_LEVEL);
      const lldPreFreq = lldEligPre.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
      const lldSufFreq = lldEligSuf.reduce((s, a) => s + ((a.frequency === '' ? 1 : parseInt(a.frequency) || 0)), 0);
      const pPreLLD = preTotalFreq > 0 ? lldPreFreq / preTotalFreq : 1;
      const pSufLLD = sufTotalFreq > 0 ? lldSufFreq / sufTotalFreq : 1;

      // Weighted average across all possible slot configurations
      let pLLD = 0;
      let maxRemainingPre = 0, maxRemainingSuf = 0;
      for (const config of slotDist) {
        const remPre = Math.max(0, config.pre - selPre.length);
        const remSuf = Math.max(0, config.suf - selSuf.length);
        maxRemainingPre = Math.max(maxRemainingPre, remPre);
        maxRemainingSuf = Math.max(maxRemainingSuf, remSuf);
        pLLD += config.prob * Math.pow(pPreLLD, remPre) * Math.pow(pSufLLD, remSuf);
      }

      if (maxRemainingPre === 0 && maxRemainingSuf === 0) {
        html += '<div class="lld-eligible">All affix slots defined - item is LLD eligible!</div>';
      } else {
        html += '<div class="lld-odds">' + lldEligPre.length + ' of ' + eligPre.length + ' eligible prefixes are LLD (' + (pPreLLD * 100).toFixed(1) + '% by weight)</div>';
        html += '<div class="lld-odds">' + lldEligSuf.length + ' of ' + eligSuf.length + ' eligible suffixes are LLD (' + (pSufLLD * 100).toFixed(1) + '% by weight)</div>';
        html += '<div class="lld-odds">Chance remaining affixes keep item LLD-eligible: <span class="lld-value">' + (pLLD * 100).toFixed(2) + '%</span></div>';
        const lldCombinedProb = combinedProb * pLLD;
        if (lldCombinedProb > 0) {
          const lldCombinedRatio = Math.round(1 / lldCombinedProb);
          html += '<div class="lld-odds">Overall LLD + match chance: <span class="lld-value">' + oddsText(lldCombinedRatio) + '</span></div>';
          const lldRange = findIlvlRange(item, validPrefixes, validSuffixes, selPre, selSuf, state.quality, state.category, state.ethereal, state.ilvl, LLD_MAX_LEVEL);
          if (lldRange && (lldRange.lo !== lldRange.hi)) {
            html += '<div class="lld-odds" style="color:#a0a0b0; font-size:0.75rem;">Same odds for ilvl ' + lldRange.lo + '-' + lldRange.hi + '</div>';
          }
        }
      }
      html += '</div>';
    }

    // ilvl breakdown button (computed on demand)
    html += '<div style="margin-top:10px; text-align:center;">';
    html += '<button class="ilvl-breakdown-btn" onclick="toggleIlvlBreakdown(\'ilvl-bd-exact\', \'exact\')">Show ilvl Breakdown</button>';
    html += '</div>';
    html += '<div id="ilvl-bd-exact" class="ilvl-breakdown" style="display:none;"></div>';

    html += '</div>';
  }

  preview.innerHTML = html;
  stateToHash();
}

// --- Mod code -> human-readable text ---
// Build property lookup from Properties data
const propMap = {};
for (const p of PROPERTIES_DATA) {
  if (p.code) propMap[p.code] = p;
}

// Display templates: code -> format string with {range} and {param}
